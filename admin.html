<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>预约管理后台</title>
  <style>
    :root{--ink:#16212b;--muted:#66737f;--line:#dce3e7;--bg:#f3f6f7;--panel:#fff;--green:#126b57;--green-soft:#e9f4f0;--blue:#28638e;--blue-soft:#eaf2f8;--amber:#8e6217;--amber-soft:#fff4dc;--red:#a23d38;--red-soft:#fbedeb;--shadow:0 12px 34px rgba(20,35,45,.07)}*{box-sizing:border-box}[hidden]{display:none!important}body{margin:0;background:var(--bg);color:var(--ink);font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif}button,input,select,textarea{font:inherit}button{cursor:pointer}.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;border:1px solid var(--line);background:#fff;color:var(--ink);border-radius:9px;padding:9px 13px;font-weight:750;text-decoration:none}.btn:hover{border-color:#9dabb5}.btn.primary{background:var(--green);border-color:var(--green);color:#fff}.btn.warning{background:var(--amber-soft);border-color:#e4c77f;color:var(--amber)}.btn.danger{color:var(--red)}.btn.small{padding:6px 9px;font-size:12px}.btn:disabled{opacity:.45;cursor:not-allowed}.login{width:min(430px,calc(100% - 28px));margin:11vh auto;padding:30px;background:#fff;border:1px solid var(--line);border-radius:18px;box-shadow:var(--shadow)}.login h1{margin:0 0 5px}.subtle{color:var(--muted)}.error{color:var(--red);min-height:20px;margin-top:7px}.app{min-height:100vh}.global-head{height:66px;background:#fff;border-bottom:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;padding:0 max(20px,calc((100vw - 1240px)/2));position:sticky;top:0;z-index:5}.brand{display:flex;align-items:center;gap:10px;font-weight:850;font-size:17px}.mark{width:34px;height:34px;border-radius:10px;background:var(--green);color:#fff;display:grid;place-items:center}.shell{width:min(1240px,calc(100% - 32px));margin:24px auto 60px}.page-head{display:flex;justify-content:space-between;align-items:flex-start;gap:18px;margin-bottom:18px}.page-head h1{font-size:26px;margin:0 0 4px}.actions{display:flex;gap:8px;flex-wrap:wrap}.panel{background:#fff;border:1px solid var(--line);border-radius:15px;box-shadow:var(--shadow)}.field{margin-bottom:14px}.field label{display:block;font-weight:750;margin-bottom:6px}.field input,.field select,.field textarea{width:100%;border:1px solid #ccd6dc;border-radius:9px;padding:10px 11px;background:#fff}.field textarea{min-height:90px;resize:vertical}.filters{padding:14px;display:grid;grid-template-columns:1fr 190px auto;gap:10px;margin-bottom:13px}.filters .field{margin:0}.task-grid{display:grid;gap:11px}.task-card{padding:18px;display:grid;grid-template-columns:minmax(250px,1.3fr) minmax(220px,.8fr) auto;gap:20px;align-items:center}.badge{display:inline-flex;padding:4px 9px;border-radius:999px;background:#eef1f3;color:var(--muted);font-size:12px;font-weight:800}.badge.published,.badge.confirmed{background:var(--green-soft);color:var(--green)}.badge.draft{background:var(--blue-soft);color:var(--blue)}.badge.paused{background:var(--amber-soft);color:var(--amber)}.badge.cancelled,.badge.ended{background:var(--red-soft);color:var(--red)}.task-name{font-size:17px;font-weight:850;margin:5px 0 2px}.url{font-size:12px;color:var(--blue)}.stats{display:flex;gap:22px}.stat strong{display:block;font-size:20px}.stat span{font-size:12px;color:var(--muted)}.empty{padding:48px;text-align:center;color:var(--muted)}
    .task-head{padding:18px 20px;margin-bottom:14px}.task-title-row{display:flex;gap:10px;align-items:center;flex-wrap:wrap}.task-title-row h1{font-size:23px;margin:0}.task-layout{display:grid;grid-template-columns:210px 1fr;gap:14px}.task-nav{padding:10px;align-self:start;position:sticky;top:80px}.task-nav button{width:100%;text-align:left;border:0;background:transparent;border-radius:8px;padding:10px 11px;margin:2px 0;font-weight:750;color:#44515b}.task-nav button.active{background:var(--green-soft);color:var(--green)}.content{padding:20px;min-width:0}.content h2{margin:0 0 14px}.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:11px;margin-bottom:14px}.summary .panel{padding:16px}.summary strong{display:block;font-size:24px}.summary span{color:var(--muted)}.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}.info{background:#f6f8f9;border-radius:10px;padding:12px}.info strong{display:block;margin-bottom:3px}.date-tabs{display:flex;gap:7px;overflow:auto;margin-bottom:12px}.date-tab{white-space:nowrap;border:1px solid var(--line);background:#fff;border-radius:8px;padding:8px 10px}.date-tab.active{background:var(--green-soft);border-color:#82b2a5;color:var(--green)}.period{border-top:1px solid var(--line);padding:14px 0}.period:first-child{border-top:0}.period-head{display:flex;justify-content:space-between;margin-bottom:8px}.slots{display:grid;grid-template-columns:repeat(6,1fr);gap:7px}.slot{border:1px solid var(--line);background:#fff;border-radius:8px;padding:7px 4px;font-size:12px}.slot.booked{background:var(--green-soft);color:var(--green)}.slot.blocked{background:var(--amber-soft);color:var(--amber)}.slot.locked,.slot.closed{background:#f2f4f5;color:#9aa3aa}.table-wrap{overflow:auto}table{width:100%;border-collapse:collapse}th,td{text-align:left;padding:10px;border-bottom:1px solid var(--line);vertical-align:top}th{font-size:12px;color:var(--muted);white-space:nowrap}.booking-filters{display:grid;grid-template-columns:1fr 150px 150px 150px auto;gap:8px;margin-bottom:12px}.booking-filters input,.booking-filters select{border:1px solid #ccd6dc;border-radius:8px;padding:8px}.answer-list{font-size:12px;color:var(--muted)}
    .wizard{padding:22px}.steps{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:22px}.step{border:0;border-radius:9px;padding:10px;background:#f0f3f4;color:var(--muted);font-weight:800}.step.active{background:var(--green-soft);color:var(--green)}.step.done{background:var(--blue-soft);color:var(--blue)}.wizard-grid{display:grid;grid-template-columns:minmax(0,1.2fr) minmax(300px,.8fr);gap:20px}.editor-card{border:1px solid var(--line);border-radius:12px;padding:16px}.editor-card h3{margin:0 0 13px}.preview{background:#f7faf9;border:1px solid #d7e8e2;border-radius:12px;padding:18px;align-self:start;position:sticky;top:82px}.preview h2{margin:6px 0}.preview-slots{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-top:10px}.preview-slot{background:white;border:1px solid var(--line);border-radius:7px;padding:6px;text-align:center;font-size:12px}.date-tools{display:grid;grid-template-columns:1fr auto;gap:8px}.range-row{display:grid;grid-template-columns:1fr 1fr auto;gap:8px;margin-top:8px}.weekday{display:flex;gap:5px;flex-wrap:wrap;margin-top:8px}.weekday label{border:1px solid var(--line);border-radius:7px;padding:5px 7px}.weekday input{width:auto}.chips{display:flex;flex-wrap:wrap;gap:6px;margin-top:9px}.chip{border:1px solid #a9cfc4;background:var(--green-soft);color:var(--green);border-radius:999px;padding:5px 8px}.row-card{display:grid;grid-template-columns:1fr 1fr 1fr auto;gap:8px;align-items:end;background:#f5f7f8;border-radius:10px;padding:10px;margin-bottom:8px}.row-card.field-row{grid-template-columns:1fr 150px 1fr auto auto}.row-card .field{margin:0}.wizard-footer{display:flex;justify-content:space-between;align-items:center;margin-top:18px;padding-top:16px;border-top:1px solid var(--line)}.review{display:grid;grid-template-columns:1fr 1fr;gap:12px}.review .info{min-height:85px}.conflict{background:var(--amber-soft);border:1px solid #e2c57c;color:var(--amber);border-radius:10px;padding:12px;margin-top:10px}.modal-backdrop{position:fixed;inset:0;background:rgba(15,25,32,.45);z-index:20;display:grid;place-items:center;padding:16px}.modal{width:min(460px,100%);background:white;border-radius:15px;padding:22px;box-shadow:var(--shadow)}.modal h2{margin-top:0}.toast{position:fixed;left:50%;bottom:24px;transform:translate(-50%,20px);opacity:0;background:#17212b;color:#fff;padding:11px 16px;border-radius:10px;transition:.2s;z-index:30}.toast.show{opacity:1;transform:translate(-50%,0)}
    @media(max-width:900px){.task-card{grid-template-columns:1fr}.task-layout{grid-template-columns:1fr}.task-nav{position:static;display:flex;overflow:auto}.task-nav button{width:auto;white-space:nowrap}.wizard-grid{grid-template-columns:1fr}.preview{position:static}.summary{grid-template-columns:1fr 1fr}.slots{grid-template-columns:repeat(4,1fr)}.booking-filters{grid-template-columns:1fr 1fr}.row-card.field-row{grid-template-columns:1fr 1fr}.filters{grid-template-columns:1fr 150px}}@media(max-width:560px){.shell{width:calc(100% - 18px);margin-top:14px}.global-head{padding:0 10px}.page-head{display:block}.page-head .actions{margin-top:10px}.steps{grid-template-columns:1fr 1fr}.summary{grid-template-columns:1fr 1fr}.info-grid,.review{grid-template-columns:1fr}.slots{grid-template-columns:repeat(3,1fr)}.booking-filters,.filters,.range-row{grid-template-columns:1fr}.row-card{grid-template-columns:1fr 1fr}.wizard{padding:15px}}
  </style>
</head>
<body>
  <section class="login" id="loginPanel"><h1>预约管理后台</h1><p class="subtle">管理任务、开放时间和预约记录。</p><form id="loginForm"><div class="field"><label for="password">后台密码</label><input id="password" type="password" autocomplete="current-password"></div><button class="btn primary" type="submit">登录</button><div class="error" id="loginError"></div></form></section>
  <div class="app" id="adminApp" hidden><header class="global-head"><div class="brand"><span class="mark">约</span><span>预约管理</span></div><div class="actions"><button class="btn" data-route="/admin">全部任务</button><button class="btn" id="logout">退出</button></div></header><main class="shell" id="root"></main></div>
  <div class="modal-backdrop" id="cancelModal" hidden><section class="modal"><h2>取消预约</h2><p class="subtle" id="cancelTarget"></p><div class="field"><label for="cancelReason">取消原因</label><textarea id="cancelReason" placeholder="例如：管理员与预约人确认后取消"></textarea></div><div class="actions"><button class="btn" id="closeCancel">返回</button><button class="btn danger" id="confirmCancel">确认取消</button></div></section></div>
  <div class="toast" id="toast"></div>
  <script>
    const $=s=>document.querySelector(s),root=$("#root");const state={tasks:[],task:null,bookings:[],editor:null,step:1,saveMode:"draft",forceRemoveBlocks:false,cancelId:null,selectedDate:""};const statusName={draft:"草稿",published:"进行中",paused:"已暂停",ended:"已结束",archived:"已归档",confirmed:"已预约",cancelled:"已取消"};
    async function api(path,options={}){const r=await fetch(path,{headers:{"Content-Type":"application/json",...(options.headers||{})},...options});const d=r.headers.get("content-type")?.includes("json")?await r.json():await r.text();if(!r.ok){if(r.status===401)showLogin();throw Object.assign(new Error(d.error||"请求失败"),{data:d,status:r.status})}return d}function esc(v){return String(v??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"})[c])}function toast(m){$("#toast").textContent=m;$("#toast").classList.add("show");clearTimeout(toast.timer);toast.timer=setTimeout(()=>$("#toast").classList.remove("show"),2400)}function showLogin(m=""){$("#adminApp").hidden=true;$("#loginPanel").hidden=false;$("#loginError").textContent=m}function showApp(){$("#loginPanel").hidden=true;$("#adminApp").hidden=false}function route(path){history.pushState({},"",path);renderRoute()}window.addEventListener("popstate",renderRoute);document.addEventListener("click",e=>{const b=e.target.closest("[data-route]");if(b){e.preventDefault();route(b.dataset.route)}});
    async function renderRoute(){const parts=location.pathname.split("/").filter(Boolean);try{if(parts.length===1){await renderList();return}if(parts[1]==="tasks"&&parts[2]==="new"){openEditor();return}if(parts[1]==="tasks"&&parts[2]){const id=Number(parts[2]);if(parts[3]==="edit"){const task=await api(`/api/admin/tasks/${id}`);openEditor(task);return}await loadTask(id);renderTask(parts[3]||"overview");return}route("/admin")}catch(e){root.innerHTML=`<section class="panel empty"><h2>页面加载失败</h2><p>${esc(e.message)}</p><button class="btn" data-route="/admin">返回任务列表</button></section>`}}
    async function renderList(){state.tasks=await api("/api/admin/tasks");root.innerHTML=`<div class="page-head"><div><h1>预约任务</h1><div class="subtle">每个任务拥有独立预约链接和数据。</div></div><button class="btn primary" data-route="/admin/tasks/new">新建预约任务</button></div><section class="panel filters"><div class="field"><label for="taskSearch">搜索</label><input id="taskSearch" placeholder="任务名称或公开标题"></div><div class="field"><label for="taskStatus">状态</label><select id="taskStatus"><option value="all">全部状态</option>${Object.entries(statusName).slice(0,5).map(([k,v])=>`<option value="${k}">${v}</option>`).join("")}</select></div><div class="field"><label>&nbsp;</label><button class="btn" id="clearTaskFilters">清除</button></div></section><div class="task-grid" id="taskGrid"></div>`;renderTaskCards();$("#taskSearch").addEventListener("input",renderTaskCards);$("#taskStatus").addEventListener("change",renderTaskCards);$("#clearTaskFilters").onclick=()=>{$("#taskSearch").value="";$("#taskStatus").value="all";renderTaskCards()}}
    function renderTaskCards(){const q=($("#taskSearch")?.value||"").trim().toLowerCase(),status=$("#taskStatus")?.value||"all";const items=state.tasks.filter(t=>(status==="all"||t.status===status)&&(!q||`${t.name} ${t.title}`.toLowerCase().includes(q)));$("#taskGrid").innerHTML=items.length?items.map(t=>`<article class="panel task-card"><div><span class="badge ${t.status}">${statusName[t.status]}</span><div class="task-name">${esc(t.name)}</div><div class="subtle">${esc(t.title)}</div><div class="url">/b/${t.publicId}</div></div><div class="stats"><div class="stat"><strong>${t.bookingCount}</strong><span>当前预约</span></div><div class="stat"><strong>${t.slotCount}</strong><span>时间段</span></div><div class="stat"><strong>${t.dates.length}</strong><span>日期</span></div></div><div class="actions"><button class="btn primary" data-route="/admin/tasks/${t.id}/overview">管理</button><button class="btn small" data-copy="${t.publicId}">复制链接</button><button class="btn small" data-duplicate="${t.id}">复制任务</button></div></article>`).join(""):`<section class="panel empty">没有符合条件的任务。</section>`;root.querySelectorAll("[data-copy]").forEach(b=>b.onclick=()=>copyLink(b.dataset.copy));root.querySelectorAll("[data-duplicate]").forEach(b=>b.onclick=()=>duplicateTask(b.dataset.duplicate))}
    async function loadTask(id){const [task,bookings]=await Promise.all([api(`/api/admin/tasks/${id}`),api(`/api/admin/tasks/${id}/bookings`)]);state.task=task;state.bookings=bookings;if(!task.dates.includes(state.selectedDate))state.selectedDate=task.dates[0]||""}
    function taskShell(section,content){const t=state.task;root.innerHTML=`<section class="panel task-head"><div class="page-head"><div><div class="task-title-row"><h1>${esc(t.name)}</h1><span class="badge ${t.status}">${statusName[t.status]}</span></div><div class="subtle">${esc(t.title)} · /b/${t.publicId}</div></div><div class="actions"><a class="btn" href="/b/${t.publicId}" target="_blank">预览预约页</a><button class="btn" data-copy="${t.publicId}">复制链接</button>${statusButtons(t)}</div></div></section><div class="task-layout"><nav class="panel task-nav">${[["overview","概览"],["bookings","预约名单"],["schedule","开放时间"],["form","收集表单"],["settings","任务设置"]].map(([key,label])=>`<button class="${section===key?"active":""}" data-route="/admin/tasks/${t.id}/${key}">${label}</button>`).join("")}</nav><section class="panel content">${content}</section></div>`;root.querySelector("[data-copy]").onclick=()=>copyLink(t.publicId);root.querySelectorAll("[data-status]").forEach(b=>b.onclick=()=>setStatus(b.dataset.status))}
    function statusButtons(t){if(t.status==="draft")return `<button class="btn primary" data-status="published">发布</button>`;if(t.status==="published")return `<button class="btn warning" data-status="paused">暂停</button><button class="btn" data-status="ended">结束</button>`;if(t.status==="paused")return `<button class="btn primary" data-status="published">恢复</button><button class="btn" data-status="ended">结束</button>`;if(t.status==="ended")return `<button class="btn" data-status="archived">归档</button>`;return `<button class="btn" data-status="ended">恢复到已结束</button>`}
    function renderTask(section){const t=state.task;if(section==="overview"){const active=state.bookings.filter(b=>b.status==="confirmed").length;taskShell(section,`<h2>任务概览</h2><div class="summary"><div class="panel"><strong>${active}</strong><span>当前预约</span></div><div class="panel"><strong>${t.slots.length}</strong><span>总时间段</span></div><div class="panel"><strong>${t.slots.filter(s=>s.status==="available").length}</strong><span>当前可预约</span></div><div class="panel"><strong>${t.dates.length}</strong><span>开放日期</span></div></div><div class="info-grid"><div class="info"><strong>预约说明</strong>${esc(t.description)||"未设置"}</div><div class="info"><strong>地点</strong>${esc(t.location)||"未设置"}</div><div class="info"><strong>单次时长</strong>${t.slotMinutes} 分钟</div><div class="info"><strong>开放方式</strong>${t.openingStrategy==="any"?"全部开放":"按顺序逐个开放"}</div></div>`);return}if(section==="bookings"){renderBookings();return}if(section==="schedule"){renderSchedule();return}if(section==="form"){taskShell(section,`<div class="page-head"><div><h2>收集表单</h2><div class="subtle">姓名和邮箱为固定验证字段。</div></div><button class="btn primary" data-route="/admin/tasks/${t.id}/edit?step=3">编辑表单</button></div><div class="info"><strong>系统字段</strong>姓名（必填）、邮箱（必填并验证）</div>${t.fields.map(f=>`<div class="info" style="margin-top:8px"><strong>${esc(f.label)} ${f.required?"· 必填":"· 选填"}</strong>${{text:"单行文本",textarea:"多行文本",phone:"手机号",select:`选择项：${f.options.join(" / ")}`}[f.type]}</div>`).join("")||`<div class="empty">没有附加字段。</div>`}`);return}taskShell(section,`<div class="page-head"><div><h2>任务设置</h2><div class="subtle">修改基本信息、开放规则或表单。</div></div><button class="btn primary" data-route="/admin/tasks/${t.id}/edit">编辑任务</button></div><div class="info-grid"><div class="info"><strong>后台名称</strong>${esc(t.name)}</div><div class="info"><strong>公开标题</strong>${esc(t.title)}</div><div class="info"><strong>联系人</strong>${esc(t.contact)||"未设置"}</div><div class="info"><strong>时区</strong>${esc(t.timezone)}</div></div><div class="conflict" style="margin-top:14px"><strong>数据保护</strong><br>修改开放设置不会静默删除预约；不再有效的后台占用也必须确认后才能清理。</div>`)}
    async function renderBookings(){const t=state.task;taskShell("bookings",`<div class="page-head"><div><h2>预约名单</h2><div class="subtle">可查看当前预约和取消历史。</div></div><a class="btn" href="/api/admin/tasks/${t.id}/export.csv">导出 CSV</a></div><div class="booking-filters"><input id="bookingSearch" placeholder="搜索姓名、邮箱或答案"><select id="bookingStatus"><option value="all">全部状态</option><option value="confirmed">已预约</option><option value="cancelled">已取消</option></select><input id="bookingStart" type="date" aria-label="开始日期"><input id="bookingEnd" type="date" aria-label="结束日期"><button class="btn" id="applyBookingFilter">筛选</button></div><div class="table-wrap" id="bookingTable"></div>`);const apply=async()=>{const p=new URLSearchParams({status:$("#bookingStatus").value});if($("#bookingSearch").value.trim())p.set("search",$("#bookingSearch").value.trim());if($("#bookingStart").value)p.set("startDate",$("#bookingStart").value);if($("#bookingEnd").value)p.set("endDate",$("#bookingEnd").value);state.bookings=await api(`/api/admin/tasks/${t.id}/bookings?${p}`);renderBookingTable()};$("#applyBookingFilter").onclick=apply;$("#bookingSearch").addEventListener("keydown",e=>{if(e.key==="Enter")apply()});renderBookingTable()}
    function renderBookingTable(){const fields=state.task.fields,rows=state.bookings;$("#bookingTable").innerHTML=`<table><thead><tr><th>状态</th><th>预约时间</th><th>预约人</th><th>附加信息</th><th>提交/取消</th><th>操作</th></tr></thead><tbody>${rows.length?rows.map(b=>{const labels=b.answers.__labels||{};const items=Object.entries(b.answers).filter(([k])=>k!=="__labels").map(([k,v])=>`${esc(labels[k]||fields.find(f=>f.key===k)?.label||k)}：${esc(v)}`).join("<br>");return `<tr><td><span class="badge ${b.status}">${statusName[b.status]}</span></td><td><strong>${b.date}<br>${b.time}–${b.endTime}</strong></td><td>${esc(b.name)}<br><span class="subtle">${esc(b.email)}</span></td><td class="answer-list">${items||"-"}</td><td>${b.createdAt}${b.cancelledAt?`<br><span class="subtle">取消：${b.cancelledAt}<br>${esc(b.cancellationReason)}</span>`:""}</td><td>${b.status==="confirmed"?`<button class="btn small danger" data-cancel-booking="${b.id}" data-cancel-name="${esc(b.name)}">取消</button>`:"-"}</td></tr>`}).join(""):`<tr><td colspan="6" class="empty">没有符合条件的记录。</td></tr>`}</tbody></table>`;document.querySelectorAll("[data-cancel-booking]").forEach(b=>b.onclick=()=>openCancel(b.dataset.cancelBooking,b.dataset.cancelName))}
    function renderSchedule(){const t=state.task,slots=t.slots.filter(s=>s.date===state.selectedDate),groups=new Map();slots.forEach(s=>{if(!groups.has(s.periodId))groups.set(s.periodId,{label:s.periodLabel,slots:[]});groups.get(s.periodId).slots.push(s)});taskShell("schedule",`<div class="page-head"><div><h2>开放时间</h2><div class="subtle">点击可预约时间进行后台占用，再次点击可释放。</div></div><button class="btn primary" data-route="/admin/tasks/${t.id}/edit?step=2">编辑开放规则</button></div><div class="date-tabs">${t.dates.map(d=>`<button class="date-tab ${d===state.selectedDate?"active":""}" data-date="${d}">${d}</button>`).join("")}</div>${[...groups.values()].map(g=>`<section class="period"><div class="period-head"><strong>${esc(g.label)}</strong><span>${g.slots[0].time}–${g.slots.at(-1).endTime}</span></div><div class="slots">${g.slots.map(s=>`<button class="slot ${s.status}" data-slot-date="${s.date}" data-slot-time="${s.time}" data-slot-status="${s.status}" ${!["available","blocked"].includes(s.status)?"disabled":""}>${s.time}<br>${{available:"可预约",blocked:"已占用",booked:"已预约",locked:"待开放",closed:"已关闭"}[s.status]}</button>`).join("")}</div></section>`).join("")||`<div class="empty">没有时间段。</div>`}`);root.querySelectorAll("[data-date]").forEach(b=>b.onclick=()=>{state.selectedDate=b.dataset.date;renderSchedule()});root.querySelectorAll("[data-slot-status]").forEach(b=>b.onclick=()=>toggleBlock(b))}
    async function toggleBlock(b){const blocking=b.dataset.slotStatus==="available";await api(`/api/admin/tasks/${state.task.id}/blocked-slots`,{method:blocking?"POST":"DELETE",body:JSON.stringify({date:b.dataset.slotDate,time:b.dataset.slotTime})});toast(blocking?"时间已占用":"占用已释放");await loadTask(state.task.id);renderSchedule()}
    function blankEditor(){const d=new Date(Date.now()+86400000),key=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;return {id:null,name:"",title:"",description:"",location:"",contact:"",timezone:"Asia/Shanghai",slotMinutes:10,openingStrategy:"any",dates:[key],periods:[{label:"上午",start:"09:00",end:"12:00"}],fields:[]}}
    function openEditor(task=null){state.editor=task?JSON.parse(JSON.stringify(task)):blankEditor();const p=new URLSearchParams(location.search);state.step=Number(p.get("step"))||1;state.forceRemoveBlocks=false;renderWizard()}
    function renderWizard(){const e=state.editor,labels=["基本信息","开放时间","收集表单","预览发布"];root.innerHTML=`<div class="page-head"><div><h1>${e.id?"编辑预约任务":"新建预约任务"}</h1><div class="subtle">${e.id?"修改后需保存才能生效。":"按步骤完成设置，最后预览并发布。"}</div></div><button class="btn" data-route="${e.id?`/admin/tasks/${e.id}/settings`:"/admin"}">退出编辑</button></div><section class="panel wizard"><div class="steps">${labels.map((l,i)=>`<button class="step ${state.step===i+1?"active":state.step>i+1?"done":""}" data-step="${i+1}">${i+1}. ${l}</button>`).join("")}</div><div class="wizard-grid"><div id="wizardMain"></div><aside class="preview" id="livePreview"></aside></div><div class="error" id="wizardError"></div><div id="conflictBox"></div><div class="wizard-footer"><button class="btn" id="prevStep" ${state.step===1?"disabled":""}>上一步</button><div class="actions">${state.step<4?`<button class="btn primary" id="nextStep">下一步</button>`:`<button class="btn" id="saveDraft">保存${e.id?"修改":"草稿"}</button>${!e.id||e.status==="draft"?`<button class="btn primary" id="savePublish">保存并发布</button>`:""}`}</div></div></section>`;renderWizardStep();root.querySelectorAll("[data-step]").forEach(b=>b.onclick=()=>{syncWizard();state.step=Number(b.dataset.step);renderWizard()});$("#prevStep").onclick=()=>{syncWizard();state.step--;renderWizard()};if($("#nextStep"))$("#nextStep").onclick=()=>{syncWizard();const err=validateStep(state.step);if(err){$("#wizardError").textContent=err;return}state.step++;renderWizard()};if($("#saveDraft"))$("#saveDraft").onclick=()=>saveTask(false);if($("#savePublish"))$("#savePublish").onclick=()=>saveTask(true)}
    function renderWizardStep(){const e=state.editor,box=$("#wizardMain");if(state.step===1)box.innerHTML=`<section class="editor-card"><h3>任务基本信息</h3><div class="field"><label for="editName">后台任务名称</label><input id="editName" value="${esc(e.name)}" placeholder="方便管理员识别"></div><div class="field"><label for="editTitle">公开页面标题</label><input id="editTitle" value="${esc(e.title)}"></div><div class="field"><label for="editDescription">预约说明</label><textarea id="editDescription">${esc(e.description)}</textarea></div><div class="field"><label for="editLocation">地点</label><input id="editLocation" value="${esc(e.location)}"></div><div class="field"><label for="editContact">联系人/联系方式</label><input id="editContact" value="${esc(e.contact)}"></div><div class="field"><label for="editTimezone">时区</label><select id="editTimezone">${["Asia/Shanghai","Asia/Hong_Kong","UTC"].map(z=>`<option ${e.timezone===z?"selected":""}>${z}</option>`).join("")}</select></div></section>`;else if(state.step===2){box.innerHTML=`<section class="editor-card"><h3>可预约日期</h3><div class="date-tools"><input id="singleDate" type="date"><button class="btn" id="addDate">添加日期</button></div><div class="range-row"><input id="rangeStart" type="date" aria-label="批量开始日期"><input id="rangeEnd" type="date" aria-label="批量结束日期"><button class="btn" id="addRange">批量添加</button></div><div class="weekday">${["日","一","二","三","四","五","六"].map((v,i)=>`<label><input type="checkbox" value="${i}" checked>周${v}</label>`).join("")}</div><div class="chips">${e.dates.map(d=>`<button class="chip" data-remove-date="${d}">${d} ×</button>`).join("")}</div></section><section class="editor-card" style="margin-top:12px"><div class="page-head"><h3>每日开放时段</h3><button class="btn" id="addPeriod">添加时段</button></div><div id="periodRows">${e.periods.map((p,i)=>periodRow(p,i)).join("")}</div><div class="info-grid"><div class="field"><label for="editDuration">单次预约时长</label><select id="editDuration">${[5,10,15,20,30,60].map(v=>`<option value="${v}" ${Number(e.slotMinutes)===v?"selected":""}>${v} 分钟</option>`).join("")}</select></div><div class="field"><label for="editStrategy">开放方式</label><select id="editStrategy"><option value="any" ${e.openingStrategy==="any"?"selected":""}>全部时间立即开放</option><option value="sequential" ${e.openingStrategy==="sequential"?"selected":""}>按顺序逐个开放</option></select></div></div></section>`;bindScheduleEditor()}else if(state.step===3){box.innerHTML=`<section class="editor-card"><div class="page-head"><div><h3>预约表单</h3><div class="subtle">姓名、邮箱固定；附加字段可改名且不会丢失历史答案。</div></div><button class="btn" id="addField">添加字段</button></div><div class="info"><strong>固定字段</strong>姓名、已验证邮箱</div><div id="fieldRows" style="margin-top:10px">${e.fields.map((f,i)=>fieldRow(f,i)).join("")}</div></section>`;bindFieldEditor()}else box.innerHTML=`<section class="editor-card"><h3>发布前检查</h3><div class="review"><div class="info"><strong>公开页面</strong>${esc(e.title)}<br>${esc(e.location)||"未设置地点"}</div><div class="info"><strong>开放日期</strong>${e.dates.length} 天<br>${e.dates[0]||"-"} 至 ${e.dates.at(-1)||"-"}</div><div class="info"><strong>预约规则</strong>${e.slotMinutes} 分钟/次<br>${e.periods.length} 个每日时段</div><div class="info"><strong>收集信息</strong>姓名、邮箱<br>${e.fields.length} 个附加字段</div></div><div class="conflict"><strong>发布说明</strong><br>“保存草稿”不会改变公开状态；“保存并发布”会立即允许用户通过独立链接预约。</div></section>`;renderPreview()}
    function periodRow(p,i){return `<div class="row-card"><div class="field"><label>名称</label><input data-period="${i}" data-key="label" value="${esc(p.label)}"></div><div class="field"><label>开始</label><input type="time" data-period="${i}" data-key="start" value="${p.start}"></div><div class="field"><label>结束</label><input type="time" data-period="${i}" data-key="end" value="${p.end}"></div><button class="btn danger" data-remove-period="${i}">删除</button></div>`}function fieldRow(f,i){return `<div class="row-card field-row"><div class="field"><label>字段名称</label><input data-field="${i}" data-key="label" value="${esc(f.label)}"></div><div class="field"><label>类型</label><select data-field="${i}" data-key="type">${[["text","单行文本"],["textarea","多行文本"],["phone","手机号"],["select","选择项"]].map(([v,l])=>`<option value="${v}" ${f.type===v?"selected":""}>${l}</option>`).join("")}</select></div><div class="field"><label>选项（逗号分隔）</label><input data-field="${i}" data-key="options" value="${esc((f.options||[]).join(","))}" ${f.type!=="select"?"disabled":""}></div><label><input type="checkbox" data-field="${i}" data-key="required" ${f.required?"checked":""}> 必填</label><button class="btn danger" data-remove-field="${i}">删除</button></div>`}
    function bindScheduleEditor(){$("#addDate").onclick=()=>{const d=$("#singleDate").value;if(d&&!state.editor.dates.includes(d))state.editor.dates.push(d);state.editor.dates.sort();renderWizard()};$("#addRange").onclick=()=>{const a=$("#rangeStart").value,z=$("#rangeEnd").value;if(!a||!z)return;const days=new Set([...document.querySelectorAll(".weekday input:checked")].map(x=>Number(x.value)));for(let d=new Date(`${a}T12:00:00`),end=new Date(`${z}T12:00:00`);d<=end;d.setDate(d.getDate()+1))if(days.has(d.getDay())){const k=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;if(!state.editor.dates.includes(k))state.editor.dates.push(k)}state.editor.dates.sort();renderWizard()};document.querySelectorAll("[data-remove-date]").forEach(b=>b.onclick=()=>{state.editor.dates=state.editor.dates.filter(d=>d!==b.dataset.removeDate);renderWizard()});$("#addPeriod").onclick=()=>{state.editor.periods.push({label:`时段 ${state.editor.periods.length+1}`,start:"13:00",end:"17:00"});renderWizard()};$("#periodRows").addEventListener("input",e=>{const i=Number(e.target.dataset.period);if(Number.isInteger(i))state.editor.periods[i][e.target.dataset.key]=e.target.value;renderPreview()});document.querySelectorAll("[data-remove-period]").forEach(b=>b.onclick=()=>{state.editor.periods.splice(Number(b.dataset.removePeriod),1);renderWizard()});$("#editDuration").onchange=()=>{state.editor.slotMinutes=Number($("#editDuration").value);renderPreview()};$("#editStrategy").onchange=()=>{state.editor.openingStrategy=$("#editStrategy").value}}
    function bindFieldEditor(){$("#addField").onclick=()=>{state.editor.fields.push({key:"",label:"",type:"text",options:[],required:false});renderWizard()};$("#fieldRows").addEventListener("input",e=>{const i=Number(e.target.dataset.field);if(!Number.isInteger(i))return;const key=e.target.dataset.key;if(key==="required")state.editor.fields[i][key]=e.target.checked;else if(key==="options")state.editor.fields[i][key]=e.target.value.split(/[,，]/).map(v=>v.trim()).filter(Boolean);else state.editor.fields[i][key]=e.target.value;if(key==="type")renderWizard()});document.querySelectorAll("[data-remove-field]").forEach(b=>b.onclick=()=>{state.editor.fields.splice(Number(b.dataset.removeField),1);renderWizard()})}
    function syncWizard(){const e=state.editor;if($("#editName")){e.name=$("#editName").value.trim();e.title=$("#editTitle").value.trim();e.description=$("#editDescription").value.trim();e.location=$("#editLocation").value.trim();e.contact=$("#editContact").value.trim();e.timezone=$("#editTimezone").value}if($("#editDuration")){e.slotMinutes=Number($("#editDuration").value);e.openingStrategy=$("#editStrategy").value}}
    function validateStep(step){const e=state.editor;if(step===1&&(!e.name||!e.title))return "请填写后台任务名称和公开页面标题。";if(step===2&&(!e.dates.length||!e.periods.length))return "请至少设置一个日期和一个开放时段。";if(step===3){for(const f of e.fields){if(!f.label)return "请填写所有附加字段名称。";if(f.type==="select"&&(f.options||[]).length<2)return `“${f.label}”至少需要两个选项。`}}return ""}
    function renderPreview(){const e=state.editor,duration=Number($("#editDuration")?.value||e.slotMinutes||10);let daily=0;for(const p of e.periods){const [a,b]=(p.start||"0:0").split(":").map(Number),[c,d]=(p.end||"0:0").split(":").map(Number);daily+=Math.max(0,Math.floor(((c*60+d)-(a*60+b))/duration))}$("#livePreview").innerHTML=`<span class="badge">预约页预览</span><h2>${esc(e.title)||"公开页面标题"}</h2><p>${esc(e.description)||"预约说明将显示在这里。"}</p><div class="subtle">${esc(e.location)||"未设置地点"} · ${duration} 分钟/次</div><hr style="border:0;border-top:1px solid var(--line)"><strong>${e.dates.length} 个日期 · 每天约 ${daily} 个时间段</strong><div class="preview-slots">${e.periods.slice(0,2).flatMap(p=>{const out=[];let [h,m]=p.start.split(":").map(Number),[eh,em]=p.end.split(":").map(Number),end=eh*60+em,cur=h*60+m;for(let n=0;n<3&&cur+duration<=end;n++,cur+=duration)out.push(`<span class="preview-slot">${String(Math.floor(cur/60)).padStart(2,"0")}:${String(cur%60).padStart(2,"0")}</span>`);return out}).join("")}</div>`}
    async function saveTask(publish,force=false){syncWizard();for(let s=1;s<=3;s++){const err=validateStep(s);if(err){state.step=s;renderWizard();$("#wizardError").textContent=err;return}}const payload={...state.editor,forceRemoveBlocks:force};delete payload.slots;delete payload.createdAt;delete payload.updatedAt;delete payload.isDefault;try{let task;if(state.editor.id)task=await api(`/api/admin/tasks/${state.editor.id}`,{method:"PUT",body:JSON.stringify(payload)});else task=await api("/api/admin/tasks",{method:"POST",body:JSON.stringify(payload)});if(publish&&task.status!=="published")await api(`/api/admin/tasks/${task.id}/status`,{method:"POST",body:JSON.stringify({status:"published"})});toast(publish?"任务已保存并发布":"任务已保存");route(`/admin/tasks/${task.id}/overview`)}catch(err){if(err.data?.requiresBlockCleanup){$("#conflictBox").innerHTML=`<div class="conflict"><strong>${esc(err.message)}</strong><br>这些占用不再属于新开放时间。<div class="actions" style="margin-top:8px"><button class="btn warning" id="forceSave">确认清理并保存</button></div></div>`;$("#forceSave").onclick=()=>saveTask(publish,true)}else $("#wizardError").textContent=err.message}}
    async function setStatus(status){try{await api(`/api/admin/tasks/${state.task.id}/status`,{method:"POST",body:JSON.stringify({status})});toast(`任务已更新为${statusName[status]}`);await loadTask(state.task.id);renderTask(location.pathname.split("/").filter(Boolean)[3]||"overview")}catch(e){toast(e.message)}}async function duplicateTask(id){const t=await api(`/api/admin/tasks/${id}/copy`,{method:"POST"});toast("已复制为新草稿");route(`/admin/tasks/${t.id}/edit`)}async function copyLink(id){const u=`${location.origin}/b/${id}`;try{await navigator.clipboard.writeText(u);toast("预约链接已复制")}catch{await navigator.clipboard?.writeText?.(u);toast(u)}}
    function openCancel(id,name){state.cancelId=Number(id);$("#cancelTarget").textContent=`预约人：${name}`;$("#cancelReason").value="";$("#cancelModal").hidden=false}$("#closeCancel").onclick=()=>$("#cancelModal").hidden=true;$("#confirmCancel").onclick=async()=>{const reason=$("#cancelReason").value.trim()||"管理员取消";await api(`/api/admin/tasks/${state.task.id}/bookings/${state.cancelId}`,{method:"DELETE",body:JSON.stringify({reason})});$("#cancelModal").hidden=true;toast("预约已取消并保留记录");state.bookings=await api(`/api/admin/tasks/${state.task.id}/bookings`);renderBookings()};
    $("#loginForm").onsubmit=async e=>{e.preventDefault();try{await api("/api/admin/login",{method:"POST",body:JSON.stringify({password:$("#password").value})});showApp();renderRoute()}catch(err){showLogin(err.message)}};$("#logout").onclick=async()=>{await api("/api/admin/logout",{method:"POST"});showLogin()};
    (async()=>{try{const s=await api("/api/admin/session");if(!s.authenticated){showLogin();return}showApp();await renderRoute()}catch(e){showLogin(e.message)}})();
  </script>
