<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
  <title>预约管理后台</title>
  <link rel="stylesheet" href="/static/admin.css">
</head>
<body>
  <section class="login" id="loginPanel"><h1>预约管理后台</h1><p class="subtle">管理任务、开放时间和预约记录。</p><form id="loginForm"><div class="field"><label for="username">账号</label><input id="username" autocomplete="username" value="admin"></div><div class="field"><label for="password">密码</label><input id="password" type="password" autocomplete="current-password"></div><button class="btn primary" type="submit">登录</button><div class="error" id="loginError" role="alert"></div></form></section>
  <div class="app" id="adminApp" hidden><header class="global-head"><div class="brand"><span class="mark">约</span><span>预约管理</span></div><nav class="actions" aria-label="后台导航"><button class="btn" data-route="/admin">全部任务</button><button class="btn" data-route="/admin/agenda">今日议程</button><button class="btn" data-route="/admin/notifications">通知</button><button class="btn" data-route="/admin/settings">系统设置</button><button class="btn" id="logout">退出</button></nav></header><div class="security-banner" id="securityBanner" hidden>安全提醒：当前仍在使用默认后台密码，请尽快在生产环境更换。</div><main class="shell" id="root"></main></div>
  <div class="modal-backdrop" id="cancelModal" hidden><section class="modal" role="dialog" aria-modal="true" aria-labelledby="cancelModalTitle"><h2 id="cancelModalTitle">取消预约</h2><p class="subtle" id="cancelTarget"></p><div class="field"><label for="cancelReason">取消原因</label><textarea id="cancelReason" placeholder="例如：管理员与预约人确认后取消"></textarea></div><div class="actions"><button class="btn" id="closeCancel">返回</button><button class="btn danger" id="confirmCancel">确认取消</button></div></section></div>
  <div class="modal-backdrop" id="statusModal" hidden><section class="modal" role="dialog" aria-modal="true" aria-labelledby="statusModalTitle"><h2 id="statusModalTitle">确认操作</h2><p id="statusModalText"></p><div class="actions"><button class="btn" id="closeStatusModal">取消</button><button class="btn warning" id="confirmStatus">确认</button></div></section></div>
  <div class="modal-backdrop" id="blockModal" hidden><section class="modal" role="dialog" aria-modal="true" aria-labelledby="blockModalTitle"><h2 id="blockModalTitle">确认时间操作</h2><p id="blockModalText"></p><div class="actions"><button class="btn" id="closeBlockModal">取消</button><button class="btn warning" id="confirmBlock">确认</button></div></section></div>
  <div class="toast" id="toast"></div>
  <script src="/static/admin.js" defer></script>
  <script src="/static/admin_product.js" defer></script>
  <script src="/static/admin_v3.js" defer></script>
</body>
</html>
