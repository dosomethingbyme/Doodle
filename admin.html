<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AIAD 预约后台</title>
    <style>
      :root {
        --bg: #f7faf9;
        --ink: #17212f;
        --muted: #637083;
        --line: #d9e2e6;
        --teal: #087b7d;
        --teal-soft: #e8f6f5;
        --red: #d53f4c;
        --shadow: 0 18px 50px rgba(23, 33, 47, 0.08);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 18% 8%, rgba(8, 123, 125, 0.1), transparent 26rem),
          linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
        color: var(--ink);
      }

      button,
      input,
      select {
        font: inherit;
      }

      a {
        color: inherit;
        text-decoration: none;
      }

      .app {
        padding: 28px;
      }

      .shell {
        width: min(1480px, 100%);
        margin: 0 auto;
      }

      [hidden] {
        display: none !important;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        margin-bottom: 24px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .brand-mark {
        display: grid;
        width: 44px;
        height: 44px;
        place-items: center;
        border: 1px solid rgba(8, 123, 125, 0.35);
        border-radius: 8px;
        background: linear-gradient(135deg, #ffffff, var(--teal-soft));
        color: var(--teal);
      }

      h1 {
        margin: 0;
        font-size: 30px;
        line-height: 1.2;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.95);
        box-shadow: var(--shadow);
      }

      .button {
        display: inline-flex;
        min-height: 42px;
        align-items: center;
        justify-content: center;
        gap: 8px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--ink);
        cursor: pointer;
        padding: 0 16px;
        font-size: 15px;
        font-weight: 680;
      }

      .button.primary {
        border-color: var(--teal);
        background: var(--teal);
        color: #fff;
      }

      .top-actions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .login-panel {
        width: min(460px, 100%);
        margin: 12vh auto 0;
        padding: 30px;
      }

      .login-panel h1 {
        margin-bottom: 10px;
      }

      .login-panel p {
        margin: 0 0 24px;
        color: var(--muted);
        line-height: 1.6;
      }

      .login-panel .button {
        width: 100%;
        margin-top: 8px;
      }

      .login-error {
        min-height: 22px;
        margin-top: 12px;
        color: var(--red);
        font-size: 14px;
      }

      .filters {
        display: grid;
        grid-template-columns: repeat(6, minmax(140px, 1fr));
        gap: 14px;
        margin-bottom: 16px;
        padding: 22px 24px;
      }

      .field {
        display: grid;
        gap: 8px;
      }

      label {
        color: #344254;
        font-size: 14px;
        font-weight: 720;
      }

      input,
      select {
        width: 100%;
        min-height: 42px;
        border: 1px solid #b8c8cf;
        border-radius: 7px;
        background: #fff;
        color: var(--ink);
        padding: 0 12px;
        outline: none;
      }

      input:focus,
      select:focus {
        border-color: var(--teal);
        box-shadow: 0 0 0 4px rgba(8, 123, 125, 0.12);
      }

      .field.actions {
        align-self: end;
        grid-template-columns: 1fr 1fr;
      }

      .quick-actions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
        margin: -4px 0 16px;
      }

      .quick-actions .button {
        min-height: 36px;
        padding: 0 12px;
        font-size: 14px;
      }

      .summary {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 14px;
        margin-bottom: 16px;
      }

      .stat {
        padding: 18px 20px;
      }

      .stat span {
        color: var(--muted);
        font-size: 14px;
      }

      .stat strong {
        display: block;
        margin-top: 6px;
        font-size: 28px;
      }

      .preview-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        padding: 18px 20px;
        border-bottom: 1px solid var(--line);
      }

      .preview-head h2 {
        margin: 0;
        font-size: 19px;
      }

      .preview-head span {
        color: var(--muted);
        font-size: 14px;
      }

      .calendar {
        margin-bottom: 16px;
        padding: 22px 24px;
      }

      .calendar-toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }

      .calendar-week-actions {
        display: flex;
        gap: 10px;
      }

      .admin-legend {
        display: flex;
        align-items: center;
        gap: 20px;
        color: var(--muted);
        font-size: 14px;
      }

      .legend-swatch {
        display: inline-block;
        width: 30px;
        height: 18px;
        margin-right: 7px;
        border: 1px solid var(--teal);
        border-radius: 5px;
        background: #fff;
        vertical-align: middle;
      }

      .legend-swatch.booked {
        background: var(--teal-soft);
      }

      .date-tabs {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
        gap: 12px;
        margin-bottom: 20px;
      }

      .date-tab {
        min-height: 76px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--ink);
        cursor: pointer;
        text-align: center;
      }

      .date-tab strong {
        display: block;
        margin-bottom: 5px;
        font-size: 17px;
      }

      .date-tab span {
        color: var(--muted);
        font-size: 13px;
        font-weight: 680;
      }

      .date-tab[aria-selected="true"] {
        border-color: var(--teal);
        background: var(--teal-soft);
      }

      .calendar-layout {
        display: grid;
        grid-template-columns: minmax(0, 1fr) 310px;
        gap: 20px;
        align-items: start;
      }

      .time-group {
        display: grid;
        grid-template-columns: 92px minmax(0, 1fr);
        gap: 18px;
      }

      .time-group + .time-group {
        margin-top: 22px;
        padding-top: 22px;
        border-top: 1px dashed var(--line);
      }

      .period-title strong {
        display: block;
        margin-bottom: 6px;
        font-size: 19px;
      }

      .period-title span {
        color: var(--muted);
        font-size: 14px;
      }

      .slot-grid {
        display: grid;
        grid-template-columns: repeat(6, minmax(88px, 1fr));
        gap: 12px;
      }

      .slot-card {
        min-height: 72px;
        border: 1px solid var(--teal);
        border-radius: 7px;
        background: #fff;
        color: var(--ink);
        cursor: pointer;
        padding: 9px 10px;
        text-align: center;
      }

      .slot-card strong,
      .slot-card span {
        display: block;
      }

      .slot-card strong {
        font-size: 17px;
      }

      .slot-card span {
        margin-top: 5px;
        color: var(--muted);
        font-size: 13px;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .slot-card .slot-state {
        color: var(--teal);
        font-weight: 760;
      }

      .slot-card.booked {
        border-color: rgba(8, 123, 125, 0.65);
        background: var(--teal-soft);
      }

      .slot-card.selected {
        border-color: var(--teal);
        background: var(--teal);
        color: #fff;
      }

      .slot-card.selected span {
        color: rgba(255, 255, 255, 0.84);
      }

      .slot-detail {
        min-height: 280px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        padding: 18px;
      }

      .slot-detail h3 {
        margin: 0 0 14px;
        font-size: 18px;
      }

      .detail-list {
        display: grid;
        gap: 12px;
        color: var(--muted);
        font-size: 14px;
      }

      .detail-list strong {
        display: block;
        margin-top: 4px;
        color: var(--ink);
        font-size: 16px;
      }

      .table-wrap {
        overflow-x: auto;
      }

      table {
        width: 100%;
        min-width: 920px;
        border-collapse: collapse;
      }

      th,
      td {
        padding: 14px 16px;
        border-bottom: 1px solid var(--line);
        text-align: left;
        vertical-align: middle;
      }

      th {
        background: #f1f7f6;
        color: #344254;
        font-size: 14px;
        font-weight: 760;
      }

      td {
        color: var(--muted);
        font-size: 15px;
      }

      td strong {
        color: var(--ink);
      }

      .status {
        display: inline-flex;
        align-items: center;
        min-height: 28px;
        padding: 0 10px;
        border-radius: 999px;
        background: #eef3f4;
        color: #5e6875;
        font-size: 13px;
        font-weight: 700;
      }

      .status.booked {
        background: var(--teal-soft);
        color: var(--teal);
      }

      .danger {
        border: 0;
        background: transparent;
        color: var(--red);
        cursor: pointer;
        font-weight: 700;
      }

      .toast {
        position: fixed;
        right: 28px;
        bottom: 28px;
        max-width: 360px;
        padding: 16px 18px;
        border: 1px solid rgba(8, 123, 125, 0.35);
        border-radius: 8px;
        background: #fff;
        box-shadow: var(--shadow);
        opacity: 0;
        transform: translateY(10px);
        pointer-events: none;
        transition: opacity 180ms ease, transform 180ms ease;
      }

      .toast.show {
        opacity: 1;
        transform: translateY(0);
      }

      @media (max-width: 1060px) {
        .filters {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }

      @media (max-width: 760px) {
        .app {
          padding: 16px;
        }

        .topbar,
        .preview-head {
          align-items: flex-start;
          flex-direction: column;
        }

        h1 {
          font-size: 24px;
        }

        .filters,
        .summary {
          grid-template-columns: 1fr;
        }

        .calendar-layout,
        .time-group {
          grid-template-columns: 1fr;
        }

        .calendar-toolbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .slot-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <div class="shell">
        <section class="panel login-panel" id="loginPanel" aria-label="后台登录">
          <h1>后台登录</h1>
          <p>请输入后台密码后查看预约名单、导出表格或取消预约。</p>
          <form id="loginForm">
            <div class="field">
              <label for="adminPassword">后台密码</label>
              <input id="adminPassword" type="password" autocomplete="current-password" required />
            </div>
            <button class="button primary" type="submit">进入后台</button>
            <div class="login-error" id="loginError" role="alert"></div>
          </form>
        </section>

        <div id="adminApp" hidden>
        <header class="topbar">
          <div class="brand">
            <div class="brand-mark" aria-hidden="true">
              <svg width="25" height="25" viewBox="0 0 24 24" fill="none">
                <path
                  d="M7 3v3M17 3v3M4.5 9.2h15M6.8 5h10.4c1.2 0 2.3 1 2.3 2.3v10.4c0 1.2-1 2.3-2.3 2.3H6.8c-1.2 0-2.3-1-2.3-2.3V7.3C4.5 6 5.6 5 6.8 5Z"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                />
                <path d="M8 13h3M13 13h3M8 16h3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
              </svg>
            </div>
            <h1>AIAD 预约后台</h1>
          </div>
          <div class="top-actions">
            <button class="button" type="button" id="logoutButton">退出后台</button>
            <a class="button" href="/">返回预约页</a>
          </div>
        </header>

        <section class="panel filters" aria-label="预览筛选">
          <div class="field">
            <label for="startDate">开始日期</label>
            <input id="startDate" type="date" />
          </div>
          <div class="field">
            <label for="endDate">结束日期</label>
            <input id="endDate" type="date" />
          </div>
          <div class="field">
            <label for="timeFilter">时间段</label>
            <select id="timeFilter"></select>
          </div>
          <div class="field">
            <label for="statusFilter">状态</label>
            <select id="statusFilter">
              <option value="all">全部</option>
              <option value="booked">只看已预约</option>
              <option value="available">只看可预约</option>
            </select>
          </div>
          <div class="field">
            <label for="searchInput">预约人/邮箱</label>
            <input id="searchInput" type="search" placeholder="搜索姓名或邮箱" />
          </div>
          <div class="field actions">
            <button class="button" type="button" id="previewButton">预览</button>
            <a class="button primary" id="exportLink" href="/api/export.csv">导出表格</a>
          </div>
        </section>

        <div class="quick-actions" aria-label="快捷日期">
          <button class="button" type="button" id="thisWeek">本周三至周五</button>
          <button class="button" type="button" id="nextWeek">下周三至周五</button>
          <button class="button" type="button" id="todayOnly">今天</button>
          <button class="button" type="button" id="refresh">刷新数据库</button>
        </div>

        <section class="summary" aria-label="预览统计">
          <div class="panel stat">
            <span>预览时间段</span>
            <strong id="totalSlots">0</strong>
          </div>
          <div class="panel stat">
            <span>已预约</span>
            <strong id="bookedSlots">0</strong>
          </div>
          <div class="panel stat">
            <span>可预约</span>
            <strong id="availableSlots">0</strong>
          </div>
          <div class="panel stat">
            <span>数据库预约总数</span>
            <strong id="allBookings">0</strong>
          </div>
        </section>

        <section class="panel calendar" aria-label="日历式预约预览">
          <div class="preview-head">
            <h2>日历式预约看板</h2>
            <span id="calendarInfo">按周查看每个 20 分钟时间点是否已被预约。</span>
          </div>
          <div class="calendar-toolbar">
            <div class="admin-legend" aria-label="时间状态说明">
              <span><span class="legend-swatch"></span>可预约</span>
              <span><span class="legend-swatch booked"></span>已预约</span>
            </div>
            <div class="calendar-week-actions" aria-label="切换日历周">
              <button class="button" type="button" id="calendarPrevWeek">上一周</button>
              <button class="button" type="button" id="calendarNextWeek">下一周</button>
            </div>
          </div>
          <div class="date-tabs" id="calendarDateTabs" role="tablist" aria-label="预览日期"></div>
          <div class="calendar-layout">
            <div id="calendarSlots" aria-live="polite"></div>
            <aside class="slot-detail" id="slotDetail" aria-label="所选时间段详情"></aside>
          </div>
        </section>

        <section class="panel schedule" aria-label="每个时间段的预约人预览">
          <div class="preview-head">
            <h2>预览</h2>
            <span id="previewInfo">选择日期和时间段后预览预约表。</span>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>日期</th>
                  <th>时间段</th>
                  <th>状态</th>
                  <th>预约人</th>
                  <th>邮箱</th>
                  <th>提交时间</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="scheduleBody"></tbody>
            </table>
          </div>
        </section>
        </div>
      </div>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script>
      const MONTH_DAY = new Intl.DateTimeFormat("zh-CN", { month: "numeric", day: "numeric" });
      const FULL_DATE = new Intl.DateTimeFormat("zh-CN", { month: "numeric", day: "numeric", weekday: "short" });
      const VALID_TIMES = [...rangeTimes(9, 12), ...rangeTimes(14, 17)];
      const state = { bookings: [], previewRows: [], selectedDate: "", selectedSlotKey: "", weekOffset: 0 };

      const loginPanel = document.querySelector("#loginPanel");
      const adminApp = document.querySelector("#adminApp");
      const loginForm = document.querySelector("#loginForm");
      const adminPassword = document.querySelector("#adminPassword");
      const loginError = document.querySelector("#loginError");
      const startDateInput = document.querySelector("#startDate");
      const endDateInput = document.querySelector("#endDate");
      const timeFilter = document.querySelector("#timeFilter");
      const statusFilter = document.querySelector("#statusFilter");
      const searchInput = document.querySelector("#searchInput");
      const scheduleBody = document.querySelector("#scheduleBody");
      const previewInfo = document.querySelector("#previewInfo");
      const calendarInfo = document.querySelector("#calendarInfo");
      const calendarDateTabs = document.querySelector("#calendarDateTabs");
      const calendarSlots = document.querySelector("#calendarSlots");
      const slotDetail = document.querySelector("#slotDetail");
      const calendarPrevWeek = document.querySelector("#calendarPrevWeek");
      const calendarNextWeek = document.querySelector("#calendarNextWeek");
      const exportLink = document.querySelector("#exportLink");
      const toast = document.querySelector("#toast");

      function rangeTimes(startHour, endHour) {
        const result = [];
        for (let minutes = startHour * 60; minutes < endHour * 60; minutes += 20) {
          const h = Math.floor(minutes / 60);
          const m = minutes % 60;
          result.push(`${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}`);
        }
        return result;
      }

      function fillTimeOptions() {
        const exact = VALID_TIMES.map((time) => `<option value="${time}">${time} - ${endTime(time)}</option>`).join("");
        timeFilter.innerHTML = `
          <option value="all">全部时间段</option>
          <option value="morning">上午 09:00-12:00</option>
          <option value="afternoon">下午 14:00-17:00</option>
          ${exact}
        `;
      }

      async function api(path, options = {}) {
        const response = await fetch(path, {
          headers: { "Content-Type": "application/json", ...(options.headers || {}) },
          ...options,
        });
        const data = response.headers.get("content-type")?.includes("application/json")
          ? await response.json()
          : await response.text();
        if (!response.ok) {
          if (response.status === 401) showLogin();
          throw new Error(data.error || "请求失败");
        }
        return data;
      }

      function showLogin(message = "") {
        adminApp.hidden = true;
        loginPanel.hidden = false;
        loginError.textContent = message;
        adminPassword.focus();
      }

      function showAdmin() {
        loginPanel.hidden = true;
        adminApp.hidden = false;
      }

      async function checkSession() {
        try {
          const session = await api("/api/admin/session");
          if (session.authenticated) {
            showAdmin();
            setRange(0);
            await refresh();
          } else {
            showLogin();
          }
        } catch (error) {
          showLogin(error.message);
        }
      }

      function dateKey(date) {
        return `${date.getFullYear()}-${String(date.getMonth() + 1).padStart(2, "0")}-${String(date.getDate()).padStart(2, "0")}`;
      }

      function toDate(key) {
        const [year, month, day] = key.split("-").map(Number);
        return new Date(year, month - 1, day);
      }

      function getWeekDates(offset = 0) {
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const daysToWednesday = (3 - today.getDay() + 7) % 7;
        const firstWednesday = new Date(today);
        firstWednesday.setDate(today.getDate() + daysToWednesday + offset * 7);
        return [0, 1, 2].map((add) => {
          const item = new Date(firstWednesday);
          item.setDate(firstWednesday.getDate() + add);
          return item;
        });
      }

      function selectedDates() {
        const start = toDate(startDateInput.value);
        const end = toDate(endDateInput.value);
        if (Number.isNaN(start.getTime()) || Number.isNaN(end.getTime())) return [];
        const first = start <= end ? start : end;
        const last = start <= end ? end : start;
        const result = [];
        const current = new Date(first);
        while (current <= last) {
          if ([3, 4, 5].includes(current.getDay())) result.push(new Date(current));
          current.setDate(current.getDate() + 1);
        }
        return result;
      }

      function selectedTimes() {
        if (timeFilter.value === "morning") return VALID_TIMES.filter((time) => time < "12:00");
        if (timeFilter.value === "afternoon") return VALID_TIMES.filter((time) => time >= "14:00");
        if (VALID_TIMES.includes(timeFilter.value)) return [timeFilter.value];
        return VALID_TIMES;
      }

      function endTime(start) {
        const [h, m] = start.split(":").map(Number);
        const total = h * 60 + m + 20;
        return `${String(Math.floor(total / 60)).padStart(2, "0")}:${String(total % 60).padStart(2, "0")}`;
      }

      function buildPreviewRows() {
        const bookingsBySlot = new Map(state.bookings.map((booking) => [`${booking.date}-${booking.time}`, booking]));
        const search = searchInput.value.trim().toLowerCase();
        return selectedDates()
          .flatMap((date) =>
            selectedTimes().map((time) => {
              const booking = bookingsBySlot.get(`${dateKey(date)}-${time}`);
              return { date, time, booking };
            })
          )
          .filter((row) => {
            if (statusFilter.value === "booked" && !row.booking) return false;
            if (statusFilter.value === "available" && row.booking) return false;
            if (search && (!row.booking || !`${row.booking.name} ${row.booking.email}`.toLowerCase().includes(search))) return false;
            return true;
          });
      }

      function rowsForSelectedDate() {
        return state.previewRows.filter((row) => dateKey(row.date) === state.selectedDate);
      }

      function render() {
        state.previewRows = buildPreviewRows();
        const dates = selectedDates();
        if (!dates.some((date) => dateKey(date) === state.selectedDate)) {
          state.selectedDate = dates.length ? dateKey(dates[0]) : "";
          state.selectedSlotKey = "";
        }
        const booked = state.previewRows.filter((row) => row.booking).length;
        const total = state.previewRows.length;
        document.querySelector("#totalSlots").textContent = total;
        document.querySelector("#bookedSlots").textContent = booked;
        document.querySelector("#availableSlots").textContent = total - booked;
        document.querySelector("#allBookings").textContent = state.bookings.length;
        calendarPrevWeek.disabled = state.weekOffset <= 0;
        previewInfo.textContent = `${startDateInput.value || "-"} 至 ${endDateInput.value || "-"}，共 ${total} 个预览时间段`;
        exportLink.href = `/api/export.csv?${exportParams().toString()}`;
        renderCalendar();

        scheduleBody.innerHTML = state.previewRows.length
          ? state.previewRows.map(renderRow).join("")
          : `<tr><td colspan="7">当前筛选条件下没有可预览的周三、周四或周五时间段。</td></tr>`;
      }

      function renderRow(row) {
        const booking = row.booking;
        return `
          <tr>
            <td><strong>${FULL_DATE.format(row.date)}</strong></td>
            <td><strong>${row.time} - ${endTime(row.time)}</strong></td>
            <td><span class="status ${booking ? "booked" : ""}">${booking ? "已预约" : "可预约"}</span></td>
            <td>${booking ? escapeHtml(booking.name) : "-"}</td>
            <td>${booking ? escapeHtml(booking.email) : "-"}</td>
            <td>${booking ? escapeHtml(booking.createdAt) : "-"}</td>
            <td>${booking ? `<button class="danger" type="button" data-delete="${booking.id}">取消</button>` : "-"}</td>
          </tr>
        `;
      }

      function renderCalendar() {
        const dates = selectedDates();
        const rowsByDate = new Map();
        state.previewRows.forEach((row) => {
          const key = dateKey(row.date);
          if (!rowsByDate.has(key)) rowsByDate.set(key, []);
          rowsByDate.get(key).push(row);
        });

        calendarInfo.textContent = dates.length
          ? `${startDateInput.value} 至 ${endDateInput.value}，点击日期和时间段查看详情`
          : "当前日期范围内没有周三、周四或周五。";
        calendarDateTabs.innerHTML = dates.length
          ? dates
              .map((date) => {
                const key = dateKey(date);
                const rows = rowsByDate.get(key) || [];
                const booked = rows.filter((row) => row.booking).length;
                return `
                  <button class="date-tab" type="button" role="tab" aria-selected="${key === state.selectedDate}" data-calendar-date="${key}">
                    <strong>${FULL_DATE.format(date)}</strong>
                    <span>${booked}/${rows.length} 已预约</span>
                  </button>
                `;
              })
              .join("")
          : "";

        const rows = rowsForSelectedDate();
        if (!rows.length) {
          calendarSlots.innerHTML = `<div class="slot-detail">当前日期没有符合筛选条件的时间段。</div>`;
          renderSlotDetail(null);
          return;
        }

        const selectedRow = rows.find((row) => `${dateKey(row.date)}-${row.time}` === state.selectedSlotKey) || rows[0];
        state.selectedSlotKey = `${dateKey(selectedRow.date)}-${selectedRow.time}`;
        const morning = rows.filter((row) => row.time < "12:00");
        const afternoon = rows.filter((row) => row.time >= "14:00");
        calendarSlots.innerHTML = [
          renderSlotGroup("上午", "09:00-12:00", morning),
          renderSlotGroup("下午", "14:00-17:00", afternoon),
        ].join("");
        renderSlotDetail(selectedRow);
      }

      function renderSlotGroup(label, range, rows) {
        return `
          <section class="time-group" aria-label="${label} ${range}">
            <div class="period-title">
              <strong>${label}</strong>
              <span>${range}</span>
            </div>
            <div class="slot-grid">
              ${
                rows.length
                  ? rows.map(renderSlotCard).join("")
                  : `<div class="slot-detail">当前筛选下无${label}时间段。</div>`
              }
            </div>
          </section>
        `;
      }

      function renderSlotCard(row) {
        const key = `${dateKey(row.date)}-${row.time}`;
        const booking = row.booking;
        return `
          <button class="slot-card ${booking ? "booked" : ""} ${key === state.selectedSlotKey ? "selected" : ""}" type="button" data-slot-key="${key}">
            <strong>${row.time} - ${endTime(row.time)}</strong>
            <span class="slot-state">${booking ? "已预约" : "可预约"}</span>
            <span>${booking ? `${escapeHtml(booking.name)} · ${escapeHtml(booking.email)}` : "空闲"}</span>
          </button>
        `;
      }

      function renderSlotDetail(row) {
        if (!row) {
          slotDetail.innerHTML = `<h3>时间段详情</h3><div class="detail-list">请选择一个日期和时间段。</div>`;
          return;
        }
        const booking = row.booking;
        slotDetail.innerHTML = `
          <h3>时间段详情</h3>
          <div class="detail-list">
            <span>日期<strong>${FULL_DATE.format(row.date)}</strong></span>
            <span>时间<strong>${row.time} - ${endTime(row.time)}</strong></span>
            <span>状态<strong>${booking ? "已预约" : "可预约"}</strong></span>
            <span>预约人<strong>${booking ? escapeHtml(booking.name) : "-"}</strong></span>
            <span>邮箱<strong>${booking ? escapeHtml(booking.email) : "-"}</strong></span>
            <span>提交时间<strong>${booking ? escapeHtml(booking.createdAt) : "-"}</strong></span>
            ${booking ? `<button class="button" type="button" data-delete="${booking.id}">取消此预约</button>` : ""}
          </div>
        `;
      }

      function exportParams() {
        const params = new URLSearchParams();
        params.set("startDate", startDateInput.value);
        params.set("endDate", endDateInput.value);
        params.set("time", timeFilter.value);
        params.set("status", statusFilter.value);
        if (searchInput.value.trim()) params.set("search", searchInput.value.trim());
        return params;
      }

      function setRange(offset) {
        state.weekOffset = Math.max(0, offset);
        const dates = getWeekDates(offset);
        startDateInput.value = dateKey(dates[0]);
        endDateInput.value = dateKey(dates[2]);
        render();
      }

      function setToday() {
        const today = new Date();
        startDateInput.value = dateKey(today);
        endDateInput.value = dateKey(today);
        render();
      }

      function escapeHtml(value) {
        return String(value).replace(/[&<>"']/g, (char) => ({
          "&": "&amp;",
          "<": "&lt;",
          ">": "&gt;",
          '"': "&quot;",
          "'": "&#039;",
        })[char]);
      }

      function showToast(message) {
        toast.textContent = message;
        toast.classList.add("show");
        window.clearTimeout(showToast.timer);
        showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 2600);
      }

      async function refresh() {
        try {
          state.bookings = await api("/api/bookings");
          render();
        } catch (error) {
          showToast(error.message);
        }
      }

      document.querySelector("#thisWeek").addEventListener("click", () => setRange(0));
      document.querySelector("#nextWeek").addEventListener("click", () => setRange(1));
      document.querySelector("#todayOnly").addEventListener("click", setToday);
      document.querySelector("#refresh").addEventListener("click", refresh);
      document.querySelector("#previewButton").addEventListener("click", render);
      calendarPrevWeek.addEventListener("click", () => setRange(state.weekOffset - 1));
      calendarNextWeek.addEventListener("click", () => setRange(state.weekOffset + 1));

      loginForm.addEventListener("submit", async (event) => {
        event.preventDefault();
        loginError.textContent = "";
        try {
          await api("/api/admin/login", {
            method: "POST",
            body: JSON.stringify({ password: adminPassword.value }),
          });
          adminPassword.value = "";
          showAdmin();
          setRange(0);
          await refresh();
        } catch (error) {
          showLogin(error.message);
        }
      });

      document.querySelector("#logoutButton").addEventListener("click", async () => {
        try {
          await api("/api/admin/logout", { method: "POST" });
        } finally {
          state.bookings = [];
          showLogin();
        }
      });

      calendarDateTabs.addEventListener("click", (event) => {
        const tab = event.target.closest("[data-calendar-date]");
        if (!tab) return;
        state.selectedDate = tab.dataset.calendarDate;
        state.selectedSlotKey = "";
        render();
      });

      calendarSlots.addEventListener("click", (event) => {
        const slot = event.target.closest("[data-slot-key]");
        if (!slot) return;
        state.selectedSlotKey = slot.dataset.slotKey;
        renderCalendar();
      });

      [startDateInput, endDateInput, timeFilter, statusFilter, searchInput].forEach((control) => {
        control.addEventListener("input", render);
        control.addEventListener("change", render);
      });

      scheduleBody.addEventListener("click", async (event) => {
        const button = event.target.closest("[data-delete]");
        if (!button) return;
        try {
          await api(`/api/bookings/${button.dataset.delete}`, { method: "DELETE" });
          showToast("预约已取消。");
          await refresh();
        } catch (error) {
          showToast(error.message);
        }
      });

      slotDetail.addEventListener("click", async (event) => {
        const button = event.target.closest("[data-delete]");
        if (!button) return;
        try {
          await api(`/api/bookings/${button.dataset.delete}`, { method: "DELETE" });
          showToast("预约已取消。");
          state.selectedSlotKey = "";
          await refresh();
        } catch (error) {
          showToast(error.message);
        }
      });

      fillTimeOptions();
      checkSession();
    </script>
  </body>
</html>
