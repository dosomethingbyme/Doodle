services:
  aiad-booking:
    build: .
    container_name: aiad-booking
    ports:
      - "8000:8000"
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      BOOKING_DB_PATH: /data/bookings.sqlite3
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-aiad-admin-2026}
      SMTP_HOST: ${SMTP_HOST:-your-smtp-host}
      SMTP_PORT: ${SMTP_PORT:-465}
      SMTP_USER: ${SMTP_USER:-your-smtp-login}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_USE_SSL: ${SMTP_USE_SSL:-1}
    volumes:
      - aiad-booking-data:/data
    restart: unless-stopped

volumes:
  aiad-booking-data:
