services:
  aiad-booking:
    build: .
    container_name: aiad-booking
    ports:
      - "8000:8000"
    environment:
      HOST: 0.0.0.0
      PORT: 8000
      BOOKING_DB_PATH: /data/bookings.sqlite3
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?Set a strong ADMIN_PASSWORD before starting Docker}
      SMTP_HOST: ${SMTP_HOST:-}
      SMTP_PORT: ${SMTP_PORT:-0}
      SMTP_USER: ${SMTP_USER:-}
      SMTP_PASSWORD: ${SMTP_PASSWORD:-}
      SMTP_FROM: ${SMTP_FROM:-}
      SMTP_USE_SSL: ${SMTP_USE_SSL:-1}
      SMTP_STARTTLS: ${SMTP_STARTTLS:-0}
    volumes:
      - aiad-booking-data:/data
    restart: unless-stopped

volumes:
  aiad-booking-data:
