<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AIAD 样机测试时间预约</title>
    <style>
      :root {
        --bg: #f7faf9;
        --surface: #ffffff;
        --surface-soft: #f1f7f6;
        --ink: #17212f;
        --muted: #637083;
        --line: #d9e2e6;
        --line-strong: #b8c8cf;
        --teal: #087b7d;
        --teal-deep: #056568;
        --teal-soft: #e8f6f5;
        --red: #d53f4c;
        --shadow: 0 18px 50px rgba(23, 33, 47, 0.08);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          "PingFang SC", "Microsoft YaHei", sans-serif;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        background:
          radial-gradient(circle at 18% 8%, rgba(8, 123, 125, 0.1), transparent 26rem),
          linear-gradient(180deg, #ffffff 0%, var(--bg) 100%);
        color: var(--ink);
      }

      button,
      input {
        font: inherit;
      }

      button {
        cursor: pointer;
      }

      .app {
        min-height: 100vh;
        padding: 28px;
      }

      .shell {
        width: min(1480px, 100%);
        margin: 0 auto;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
        margin-bottom: 24px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .brand-mark {
        display: grid;
        width: 44px;
        height: 44px;
        place-items: center;
        border: 1px solid rgba(8, 123, 125, 0.35);
        border-radius: 8px;
        background: linear-gradient(135deg, #ffffff, var(--teal-soft));
        color: var(--teal);
        box-shadow: 0 10px 24px rgba(8, 123, 125, 0.12);
      }

      h1 {
        margin: 0;
        font-size: 30px;
        line-height: 1.2;
        font-weight: 760;
      }

      .top-note {
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        font-size: 15px;
      }

      .layout {
        display: grid;
        grid-template-columns: 390px minmax(0, 1fr);
        gap: 24px;
      }

      .panel {
        border: 1px solid var(--line);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.92);
        box-shadow: var(--shadow);
      }

      .form-panel {
        min-height: 620px;
        padding: 30px;
      }

      .section-title {
        margin: 0 0 26px;
        font-size: 24px;
        line-height: 1.25;
        font-weight: 740;
      }

      .field {
        margin-bottom: 28px;
      }

      label {
        display: block;
        margin-bottom: 10px;
        font-size: 16px;
        font-weight: 680;
      }

      .required {
        color: var(--red);
      }

      input {
        width: 100%;
        height: 56px;
        border: 1px solid var(--line-strong);
        border-radius: 6px;
        background: #fff;
        color: var(--ink);
        padding: 0 16px;
        font-size: 16px;
        outline: none;
        transition: border-color 150ms ease, box-shadow 150ms ease;
      }

      input:focus {
        border-color: var(--teal);
        box-shadow: 0 0 0 4px rgba(8, 123, 125, 0.12);
      }

      .helper {
        display: flex;
        gap: 9px;
        align-items: flex-start;
        color: var(--muted);
        font-size: 14px;
        line-height: 1.6;
      }

      .error {
        min-height: 20px;
        margin-top: 8px;
        color: var(--red);
        font-size: 13px;
      }

      .verify-row {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 10px;
        align-items: start;
      }

      .secondary {
        min-height: 56px;
        border: 1px solid var(--teal);
        border-radius: 6px;
        background: #fff;
        color: var(--teal);
        padding: 0 16px;
        font-weight: 700;
      }

      .secondary:disabled {
        cursor: not-allowed;
        border-color: var(--line-strong);
        color: #87919d;
      }

      .verification-status {
        min-height: 20px;
        margin-top: 8px;
        color: var(--muted);
        font-size: 13px;
      }

      .verification-status.ok {
        color: var(--teal);
        font-weight: 700;
      }

      .planner {
        padding: 30px;
      }

      .planner-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 18px;
        margin-bottom: 24px;
      }

      .week-controls {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .icon-button {
        display: grid;
        width: 42px;
        height: 42px;
        place-items: center;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--ink);
      }

      .icon-button:disabled {
        cursor: not-allowed;
        opacity: 0.45;
      }

      .date-tabs {
        display: grid;
        grid-template-columns: repeat(3, minmax(160px, 1fr));
        gap: 14px;
        margin-bottom: 20px;
      }

      .date-tab {
        min-height: 78px;
        border: 1px solid var(--line);
        border-radius: 8px;
        background: #fff;
        color: var(--ink);
        text-align: center;
        transition: border-color 150ms ease, background 150ms ease, color 150ms ease,
          box-shadow 150ms ease;
      }

      .date-tab strong {
        display: block;
        margin-bottom: 5px;
        font-size: 18px;
        font-weight: 740;
      }

      .date-tab span {
        color: var(--teal);
        font-size: 14px;
        font-weight: 650;
      }

      .date-tab[aria-selected="true"] {
        border-color: var(--teal);
        background: var(--teal-soft);
        box-shadow: 0 10px 24px rgba(8, 123, 125, 0.1);
      }

      .legend {
        display: flex;
        align-items: center;
        gap: 26px;
        margin: 18px 0 30px;
        color: var(--muted);
        font-size: 14px;
      }

      .legend-item {
        display: inline-flex;
        align-items: center;
        gap: 9px;
      }

      .sample {
        width: 34px;
        height: 22px;
        border: 1px solid var(--teal);
        border-radius: 5px;
        background: #fff;
      }

      .sample.busy {
        border-color: var(--line);
        background: #edf1f3;
      }

      .time-group {
        display: grid;
        grid-template-columns: 96px minmax(0, 1fr);
        gap: 22px;
        align-items: start;
      }

      .time-group + .time-group {
        margin-top: 28px;
        padding-top: 28px;
        border-top: 1px dashed var(--line);
      }

      .period-title {
        margin-top: 12px;
      }

      .period-title strong {
        display: block;
        margin-bottom: 6px;
        font-size: 20px;
      }

      .period-title span {
        color: var(--muted);
        font-size: 14px;
      }

      .slot-grid {
        display: grid;
        grid-template-columns: repeat(6, minmax(88px, 1fr));
        gap: 12px;
      }

      .slot {
        height: 54px;
        border: 1px solid var(--teal);
        border-radius: 6px;
        background: #fff;
        color: var(--ink);
        font-size: 17px;
        font-weight: 650;
        transition: transform 150ms ease, box-shadow 150ms ease, background 150ms ease,
          border-color 150ms ease;
      }

      .slot:hover:not(:disabled) {
        transform: translateY(-1px);
        box-shadow: 0 10px 18px rgba(8, 123, 125, 0.1);
      }

      .slot.selected {
        border-color: var(--teal-deep);
        background: var(--teal);
        color: #fff;
        box-shadow: 0 12px 24px rgba(8, 123, 125, 0.2);
      }

      .slot:disabled {
        cursor: not-allowed;
        border-color: var(--line);
        background: #edf1f3;
        color: #87919d;
        box-shadow: none;
      }

      .summary {
        display: grid;
        grid-template-columns: auto minmax(0, 1fr) auto;
        gap: 24px;
        align-items: center;
        margin-top: 24px;
        padding: 22px 24px;
        border: 1px solid rgba(8, 123, 125, 0.35);
        border-radius: 8px;
        background: linear-gradient(90deg, #ffffff, #eefaf9);
      }

      .summary-icon {
        display: grid;
        width: 58px;
        height: 58px;
        place-items: center;
        border-radius: 50%;
        background: var(--teal);
        color: #fff;
      }

      .summary h2 {
        margin: 0 0 10px;
        font-size: 18px;
      }

      .summary-grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, auto));
        gap: 12px 24px;
        color: var(--muted);
        font-size: 15px;
      }

      .summary-grid strong {
        color: var(--teal);
        font-size: 19px;
      }

      .summary-actions {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .primary {
        min-width: 144px;
        height: 58px;
        border: 0;
        border-radius: 6px;
        background: var(--teal);
        color: #fff;
        font-size: 17px;
        font-weight: 720;
        box-shadow: 0 14px 26px rgba(8, 123, 125, 0.22);
      }

      .primary:disabled {
        cursor: not-allowed;
        background: #9cb3b5;
        box-shadow: none;
      }

      .secondary.danger {
        border-color: rgba(213, 63, 76, 0.45);
        color: var(--red);
      }

      .records {
        margin-top: 18px;
        padding: 22px 24px;
      }

      .records-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 14px;
      }

      .records h2 {
        margin: 0;
        font-size: 18px;
      }

      .text-button {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        border: 0;
        background: transparent;
        color: var(--teal);
        font-size: 14px;
        font-weight: 680;
        text-decoration: none;
      }

      .record-list {
        display: grid;
        gap: 10px;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .record {
        display: grid;
        grid-template-columns: minmax(0, 1fr) auto;
        gap: 14px;
        align-items: center;
        padding: 12px 0;
        border-top: 1px solid var(--line);
        color: var(--muted);
        font-size: 14px;
      }

      .record strong {
        display: block;
        color: var(--ink);
        font-size: 15px;
      }

      .toast {
        position: fixed;
        right: 28px;
        bottom: 28px;
        max-width: 360px;
        padding: 16px 18px;
        border: 1px solid rgba(8, 123, 125, 0.35);
        border-radius: 8px;
        background: #fff;
        color: var(--ink);
        box-shadow: var(--shadow);
        opacity: 0;
        transform: translateY(10px);
        pointer-events: none;
        transition: opacity 180ms ease, transform 180ms ease;
      }

      .toast.show {
        opacity: 1;
        transform: translateY(0);
      }

      @media (max-width: 980px) {
        .app {
          padding: 20px;
        }

        .layout {
          grid-template-columns: 1fr;
        }

        .form-panel {
          min-height: 0;
        }

        .slot-grid {
          grid-template-columns: repeat(4, minmax(80px, 1fr));
        }
      }

      @media (max-width: 680px) {
        .app {
          padding: 16px;
        }

        .topbar,
        .planner-head,
        .summary,
        .records-head {
          align-items: flex-start;
          flex-direction: column;
        }

        h1 {
          font-size: 24px;
        }

        .top-note {
          font-size: 14px;
        }

        .form-panel,
        .planner,
        .summary,
        .records {
          padding: 20px;
        }

        .date-tabs {
          grid-template-columns: 1fr;
          width: 100%;
        }

        .week-controls {
          width: 100%;
          justify-content: space-between;
        }

        .time-group {
          grid-template-columns: 1fr;
          gap: 12px;
        }

        .period-title {
          margin-top: 0;
        }

        .slot-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .verify-row {
          grid-template-columns: 1fr;
        }

        .summary-grid {
          grid-template-columns: 1fr;
        }

        .primary {
          width: 100%;
        }

        .record {
          grid-template-columns: 1fr;
        }

        .toast {
          right: 16px;
          bottom: 16px;
          left: 16px;
          max-width: none;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <div class="shell">
        <header class="topbar">
          <div class="brand">
            <div class="brand-mark" aria-hidden="true">
              <svg width="25" height="25" viewBox="0 0 24 24" fill="none">
                <path
                  d="M7 3v3M17 3v3M4.5 9.2h15M6.8 5h10.4c1.2 0 2.3 1 2.3 2.3v10.4c0 1.2-1 2.3-2.3 2.3H6.8c-1.2 0-2.3-1-2.3-2.3V7.3C4.5 6 5.6 5 6.8 5Z"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                />
                <path d="M8 13h3M13 13h3M8 16h3" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" />
              </svg>
            </div>
            <h1>AIAD 样机测试时间预约</h1>
          </div>
          <div class="top-note">
            <svg width="19" height="19" viewBox="0 0 24 24" fill="none" aria-hidden="true">
              <path
                d="M12 8v5l3 2M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
                stroke-linejoin="round"
              />
            </svg>
            每个预约窗口 15 分钟
          </div>
        </header>

        <section class="layout" aria-label="预约表单和时间选择">
          <form class="panel form-panel" id="bookingForm" novalidate>
            <h2 class="section-title">预约信息</h2>
            <div class="field">
              <label for="name">姓名 <span class="required">*</span></label>
              <input id="name" name="name" autocomplete="name" placeholder="请输入您的姓名" />
              <div class="error" id="nameError" aria-live="polite"></div>
            </div>
            <div class="field">
              <label for="mentor">导师 <span class="required">*</span></label>
              <input id="mentor" name="mentor" autocomplete="organization-title" placeholder="请输入导师姓名" />
              <div class="error" id="mentorError" aria-live="polite"></div>
            </div>
            <div class="field">
              <label for="email">邮箱 <span class="required">*</span></label>
              <div class="verify-row">
                <input id="email" name="email" type="email" autocomplete="email" placeholder="请输入您的邮箱" />
                <button class="secondary" id="sendCode" type="button">发送验证码</button>
              </div>
              <div class="error" id="emailError" aria-live="polite"></div>
            </div>
            <div class="field">
              <label for="emailCode">邮箱验证码 <span class="required">*</span></label>
              <div class="verify-row">
                <input id="emailCode" name="emailCode" inputmode="numeric" maxlength="6" placeholder="请输入 6 位验证码" />
                <button class="secondary" id="verifyCode" type="button">验证</button>
              </div>
              <div class="verification-status" id="verificationStatus" aria-live="polite">请先发送验证码并完成邮箱验证。</div>
            </div>
            <p class="helper">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" aria-hidden="true">
                <path
                  d="M12 17v-6M12 8h.01M21 12a9 9 0 1 1-18 0 9 9 0 0 1 18 0Z"
                  stroke="currentColor"
                  stroke-width="1.8"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
              请填写真实信息，以便我们在需要时与您联系。提交后，后台数据库会把该时间标记为已占用。
            </p>
          </form>

          <section class="panel planner" aria-labelledby="timeTitle">
            <div class="planner-head">
              <h2 class="section-title" id="timeTitle">选择时间</h2>
            </div>

            <div class="date-tabs" id="dateTabs" role="tablist" aria-label="可预约日期"></div>

            <div class="legend" aria-label="时间状态说明">
              <span class="legend-item"><span class="sample"></span>可预约</span>
              <span class="legend-item"><span class="sample busy"></span>已占用</span>
            </div>

            <div id="slotGroups" aria-live="polite"></div>
          </section>
        </section>

        <section class="summary" aria-label="已选择的预约">
          <div class="summary-icon" aria-hidden="true">
            <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
              <path
                d="M7 3v3M17 3v3M4.5 9.2h15M6.8 5h10.4c1.2 0 2.3 1 2.3 2.3v10.4c0 1.2-1 2.3-2.3 2.3H6.8c-1.2 0-2.3-1-2.3-2.3V7.3C4.5 6 5.6 5 6.8 5Z"
                stroke="currentColor"
                stroke-width="1.8"
                stroke-linecap="round"
              />
              <path d="m8.5 14 2.2 2.2 4.8-5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" />
            </svg>
          </div>
          <div>
            <h2>已选择的预约</h2>
            <div class="summary-grid">
              <span>日期：<strong id="summaryDate">-</strong></span>
              <span>时间：<strong id="summaryTime">-</strong></span>
              <span>姓名：<strong id="summaryName">-</strong></span>
              <span>导师：<strong id="summaryMentor">-</strong></span>
              <span>邮箱：<strong id="summaryEmail">-</strong></span>
            </div>
          </div>
          <div class="summary-actions">
            <button class="primary" id="confirmBooking" type="button" disabled>确认预约</button>
            <button class="secondary danger" id="cancelBooking" type="button" hidden>取消已预约</button>
          </div>
        </section>

        <section class="panel records" aria-label="已占用时间">
          <div class="records-head">
            <h2>已占用时间</h2>
          </div>
          <ul class="record-list" id="recordList"></ul>
        </section>
      </div>
    </main>

    <div class="toast" id="toast" role="status" aria-live="polite"></div>

    <script>
      const WEEK_DAYS = ["周日", "周一", "周二", "周三", "周四", "周五", "周六"];
      const BOOKING_DATE_KEYS = ["2026-05-20", "2026-05-21", "2026-05-22"];
      const SLOT_MINUTES = 15;
      const VALID_TIMES = [...generateTimes(9, 12), ...generateTimes(13, 17)];
      const MONTH_DAY = new Intl.DateTimeFormat("zh-CN", { month: "numeric", day: "numeric" });
      const FULL_DATE = new Intl.DateTimeFormat("zh-CN", {
        year: "numeric",
        month: "long",
        day: "numeric",
        weekday: "long",
      });

      const state = {
        selectedDate: "",
        selectedTime: "",
        bookings: [],
        verifiedEmail: "",
        verificationToken: "",
        verificationExpiresAt: "",
        currentBooking: null,
        verificationMessage: "请先发送验证码并完成邮箱验证。",
        sendingCode: false,
        verifyingCode: false,
      };

      const nameInput = document.querySelector("#name");
      const mentorInput = document.querySelector("#mentor");
      const emailInput = document.querySelector("#email");
      const emailCodeInput = document.querySelector("#emailCode");
      const sendCodeButton = document.querySelector("#sendCode");
      const verifyCodeButton = document.querySelector("#verifyCode");
      const verificationStatus = document.querySelector("#verificationStatus");
      const dateTabs = document.querySelector("#dateTabs");
      const slotGroups = document.querySelector("#slotGroups");
      const confirmBooking = document.querySelector("#confirmBooking");
      const cancelBooking = document.querySelector("#cancelBooking");
      const recordList = document.querySelector("#recordList");
      const toast = document.querySelector("#toast");

      async function api(path, options = {}) {
        const response = await fetch(path, {
          headers: { "Content-Type": "application/json", ...(options.headers || {}) },
          ...options,
        });
        const contentType = response.headers.get("content-type") || "";
        const data = contentType.includes("application/json") ? await response.json() : await response.text();
        if (!response.ok) {
          throw new Error(data.error || "请求失败");
        }
        return data;
      }

      function dateKey(date) {
        const y = date.getFullYear();
        const m = String(date.getMonth() + 1).padStart(2, "0");
        const d = String(date.getDate()).padStart(2, "0");
        return `${y}-${m}-${d}`;
      }

      function toDate(key) {
        const [year, month, day] = key.split("-").map(Number);
        return new Date(year, month - 1, day);
      }

      function getBookingDates() {
        return BOOKING_DATE_KEYS.map(toDate);
      }

      function generateTimes(startHour, endHour) {
        const result = [];
        for (let minutes = startHour * 60; minutes < endHour * 60; minutes += SLOT_MINUTES) {
          const h = Math.floor(minutes / 60);
          const m = minutes % 60;
          result.push(`${String(h).padStart(2, "0")}:${String(m).padStart(2, "0")}`);
        }
        return result;
      }

      function endTime(start) {
        const [h, m] = start.split(":").map(Number);
        const total = h * 60 + m + SLOT_MINUTES;
        return `${String(Math.floor(total / 60)).padStart(2, "0")}:${String(total % 60).padStart(2, "0")}`;
      }

      function isBooked(date, time) {
        return state.bookings.some((booking) => booking.date === date && booking.time === time);
      }

      function normalizedEmail() {
        return emailInput.value.trim().toLowerCase();
      }

      function emailIsVerified() {
        return Boolean(state.verifiedEmail && state.verifiedEmail === normalizedEmail());
      }

      function isUpdateMode() {
        return Boolean(emailIsVerified() && state.currentBooking);
      }

      function renderDates() {
        const dates = getBookingDates();
        if (!state.selectedDate || !dates.some((date) => dateKey(date) === state.selectedDate)) {
          state.selectedDate = dateKey(dates[0]);
          state.selectedTime = "";
        }

        dateTabs.innerHTML = dates
          .map((date) => {
            const key = dateKey(date);
            const bookedCount = state.bookings.filter((booking) => booking.date === key).length;
            const label = `${MONTH_DAY.format(date)} ${WEEK_DAYS[date.getDay()]}`;
            const status = bookedCount >= VALID_TIMES.length ? "已满" : "可预约";
            return `
              <button class="date-tab" type="button" role="tab" aria-selected="${key === state.selectedDate}" data-date="${key}">
                <strong>${label}</strong>
                <span>${status}</span>
              </button>
            `;
          })
          .join("");
      }

      function renderSlots() {
        const groups = [
          { label: "上午", range: "09:00-12:00", times: generateTimes(9, 12) },
          { label: "下午", range: "13:00-17:00", times: generateTimes(13, 17) },
        ];

        slotGroups.innerHTML = groups
          .map(
            (group) => `
              <section class="time-group" aria-label="${group.label} ${group.range}">
                <div class="period-title">
                  <strong>${group.label}</strong>
                  <span>${group.range}</span>
                </div>
                <div class="slot-grid">
                  ${group.times
                    .map((time) => {
                      const booked = isBooked(state.selectedDate, time);
                      const selected = state.selectedTime === time;
                      return `
                        <button
                          class="slot ${selected ? "selected" : ""}"
                          type="button"
                          data-time="${time}"
                          ${booked ? "disabled" : ""}
                          aria-pressed="${selected}"
                        >${time}</button>
                      `;
                    })
                    .join("")}
                </div>
              </section>
            `
          )
          .join("");
      }

      function validateForm() {
        const name = nameInput.value.trim();
        const mentor = mentorInput.value.trim();
        const email = normalizedEmail();
        const emailOk = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
        const updating = isUpdateMode();

        document.querySelector("#nameError").textContent = name || updating ? "" : "请输入姓名";
        document.querySelector("#mentorError").textContent = mentor || updating ? "" : "请输入导师";
        document.querySelector("#emailError").textContent = email ? (emailOk ? "" : "请输入有效邮箱") : "请输入邮箱";

        sendCodeButton.disabled = !emailOk || state.sendingCode || emailIsVerified();
        verifyCodeButton.disabled = !emailOk || !emailCodeInput.value.trim() || state.verifyingCode || emailIsVerified();
        verificationStatus.classList.toggle("ok", emailIsVerified());
        verificationStatus.textContent = emailIsVerified()
          ? state.verificationMessage
          : state.verificationMessage;

        confirmBooking.textContent = updating ? "修改预约" : "确认预约";
        const valid = Boolean((updating || (name && mentor)) && emailOk && emailIsVerified() && state.selectedDate && state.selectedTime);
        confirmBooking.disabled = !valid;
        cancelBooking.hidden = !updating;
        cancelBooking.disabled = !updating;
        return valid;
      }

      function renderSummary() {
        document.querySelector("#summaryDate").textContent = state.selectedDate
          ? `${MONTH_DAY.format(toDate(state.selectedDate))} ${WEEK_DAYS[toDate(state.selectedDate).getDay()]}`
          : "-";
        document.querySelector("#summaryTime").textContent = state.selectedTime
          ? `${state.selectedTime} - ${endTime(state.selectedTime)}`
          : "-";
        document.querySelector("#summaryName").textContent = nameInput.value.trim() || "-";
        document.querySelector("#summaryMentor").textContent = mentorInput.value.trim() || "-";
        document.querySelector("#summaryEmail").textContent = emailInput.value.trim() || "-";
        validateForm();
      }

      function resetVerification() {
        state.verifiedEmail = "";
        state.verificationToken = "";
        state.verificationExpiresAt = "";
        state.currentBooking = null;
        state.verificationMessage = "请先发送验证码并完成邮箱验证。";
        emailCodeInput.value = "";
        renderSummary();
      }

      function renderRecords() {
        if (state.bookings.length === 0) {
          recordList.innerHTML = `<li class="record"><span>暂无已占用时间</span></li>`;
          return;
        }

        const sorted = [...state.bookings].sort((a, b) => `${a.date} ${a.time}`.localeCompare(`${b.date} ${b.time}`));
        recordList.innerHTML = sorted
          .slice(0, 8)
          .map(
            (booking) => `
              <li class="record">
                <span>
                  <strong>${FULL_DATE.format(toDate(booking.date))} ${booking.time} - ${endTime(booking.time)}</strong>
                  该时间段不可预约
                </span>
                <span>已占用</span>
              </li>
            `
          )
          .join("");
      }

      function render() {
        renderDates();
        renderSlots();
        renderSummary();
        renderRecords();
      }

      function showToast(message) {
        toast.textContent = message;
        toast.classList.add("show");
        window.clearTimeout(showToast.timer);
        showToast.timer = window.setTimeout(() => toast.classList.remove("show"), 2600);
      }

      async function refreshBookings() {
        try {
          state.bookings = await api("/api/availability");
          render();
        } catch (error) {
          showToast(`无法连接后台：${error.message}`);
        }
      }

      dateTabs.addEventListener("click", (event) => {
        const tab = event.target.closest("[data-date]");
        if (!tab) return;
        state.selectedDate = tab.dataset.date;
        state.selectedTime = "";
        render();
      });

      slotGroups.addEventListener("click", (event) => {
        const slot = event.target.closest("[data-time]");
        if (!slot || slot.disabled) return;
        state.selectedTime = slot.dataset.time;
        render();
      });

      [nameInput, mentorInput, emailInput].forEach((input) => {
        input.addEventListener("input", renderSummary);
        input.addEventListener("blur", validateForm);
      });

      emailInput.addEventListener("input", resetVerification);
      emailCodeInput.addEventListener("input", validateForm);

      sendCodeButton.addEventListener("click", async () => {
        const email = normalizedEmail();
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
          validateForm();
          return;
        }
        state.sendingCode = true;
        validateForm();
        try {
          await api("/api/verification/send", {
            method: "POST",
            body: JSON.stringify({ email }),
          });
          state.verificationMessage = "验证码已发送，请检查邮箱。";
          showToast("验证码已发送。");
        } catch (error) {
          state.verificationMessage = error.message;
          showToast(error.message);
        } finally {
          state.sendingCode = false;
          validateForm();
        }
      });

      verifyCodeButton.addEventListener("click", async () => {
        const email = normalizedEmail();
        const code = emailCodeInput.value.trim();
        state.verifyingCode = true;
        validateForm();
        try {
          const result = await api("/api/verification/verify", {
            method: "POST",
            body: JSON.stringify({ email, code }),
          });
          state.verifiedEmail = email;
          state.verificationToken = result.verificationToken || "";
          state.verificationExpiresAt = result.verificationExpiresAt || "";
          state.currentBooking = result.currentBooking || null;
          if (state.currentBooking) {
            state.selectedDate = state.currentBooking.date;
            state.selectedTime = "";
            state.verificationMessage = `邮箱验证已通过。当前预约为 ${state.currentBooking.date} ${state.currentBooking.time} - ${endTime(state.currentBooking.time)}，请选择新的时间段。`;
            showToast("邮箱验证通过，可以修改预约时间。");
            render();
          } else {
            state.verificationMessage = "邮箱验证已通过。";
            showToast("邮箱验证通过。");
          }
        } catch (error) {
          state.verifiedEmail = "";
          state.verificationToken = "";
          state.verificationExpiresAt = "";
          state.currentBooking = null;
          state.verificationMessage = error.message;
          showToast(error.message);
        } finally {
          state.verifyingCode = false;
          validateForm();
        }
      });

      confirmBooking.addEventListener("click", async () => {
        if (!validateForm()) return;
        if (isBooked(state.selectedDate, state.selectedTime)) {
          showToast("该时间已被占用，请选择其他时间。");
          state.selectedTime = "";
          render();
          return;
        }

        confirmBooking.disabled = true;
        try {
          const payload = {
            name: nameInput.value.trim(),
            mentor: mentorInput.value.trim(),
            email: normalizedEmail(),
            verificationToken: state.verificationToken,
            date: state.selectedDate,
            time: state.selectedTime,
          };
          const updating = isUpdateMode();
          const booking = await api(updating ? "/api/bookings/by-email" : "/api/bookings", {
            method: updating ? "PUT" : "POST",
            body: JSON.stringify(payload),
          });
          showToast(booking.emailWarning || (updating ? "预约时间已修改，通知邮件已发送。" : "预约成功，确认邮件已发送。"));
          state.currentBooking = booking;
          state.selectedDate = booking.date;
          state.selectedTime = "";
          state.verificationMessage = `邮箱已验证。当前预约为 ${booking.date} ${booking.time} - ${endTime(booking.time)}，可继续修改或取消。`;
          emailCodeInput.value = "";
          await refreshBookings();
        } catch (error) {
          showToast(error.message);
          await refreshBookings();
        }
      });

      cancelBooking.addEventListener("click", async () => {
        if (!isUpdateMode()) return;
        cancelBooking.disabled = true;
        try {
          await api("/api/bookings/by-email", {
            method: "DELETE",
            body: JSON.stringify({ email: normalizedEmail(), verificationToken: state.verificationToken }),
          });
          showToast("预约已取消。");
          state.currentBooking = null;
          state.selectedTime = "";
          state.verificationMessage = "预约已取消。邮箱仍已验证，可直接重新预约。";
          await refreshBookings();
        } catch (error) {
          showToast(error.message);
          await refreshBookings();
        } finally {
          validateForm();
        }
      });

      render();
      refreshBookings();
    </script>
  </body>
</html>
