<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>预约</title>
  <link rel="stylesheet" href="/static/public.css">
</head>
<body>
  <main class="shell" id="app" hidden>
    <header class="topbar"><div><div class="eyebrow">Booking page</div><h1 id="taskTitle">预约</h1><div class="description" id="taskDescription"></div><div class="meta" id="taskMeta"></div></div></header>
    <div class="status-banner" id="statusBanner" role="status" hidden></div>
    <div class="grid">
      <section class="panel schedule-panel" aria-labelledby="scheduleTitle">
        <h2 id="scheduleTitle">1 选择预约时间</h2>
        <div class="legend"><span><i class="dot available"></i>可预约</span><span><i class="dot occupied"></i>已占用</span><span><i class="dot locked"></i>待开放</span></div>
        <div class="date-tabs" id="dateTabs"></div><div id="slotGroups"></div>
      </section>
      <form class="panel form-panel" id="bookingForm" novalidate>
        <h2>2 填写预约人信息</h2>
        <div class="field"><label for="name">姓名</label><input id="name" autocomplete="name" placeholder="请输入姓名"></div>
        <div class="field"><label for="email">邮箱</label><div class="verify-row"><input id="email" type="email" autocomplete="email" placeholder="name@example.com"><button class="btn" id="sendCode" type="button">发送验证码</button></div></div>
        <div class="field"><label for="emailCode">邮箱验证码</label><div class="verify-row"><input id="emailCode" inputmode="numeric" maxlength="6" placeholder="6 位验证码"><button class="btn" id="verifyCode" type="button">验证</button></div></div>
        <div class="notice" id="verifyNotice" role="status">完成邮箱验证后即可提交预约。</div>
        <section class="current-booking" id="currentBookingCard" aria-live="polite" hidden><h3>您已预约</h3><strong id="currentBookingTime"></strong><div id="currentBookingRef"></div><div id="currentBookingLocation"></div><a id="calendarLink" class="subtle" hidden>添加到日历（ICS）</a><div class="subtle" id="rescheduleHistory"></div><div class="field" style="margin-top:10px"><label for="publicCancelReason">取消原因 <span class="optional">选填</span></label><input id="publicCancelReason" placeholder="请简要说明取消原因"></div><div class="actions"><button class="btn primary" id="startReschedule" type="button">更改预约时间</button><button class="btn" id="cancelReschedule" type="button" hidden>退出改期</button><button class="btn danger" id="cancelBooking" type="button">取消预约</button></div></section>
        <div id="customFields"></div><div class="error" id="formError" role="alert"></div>
        <div class="summary" id="selectionSummary"><span>当前选择</span><strong id="selectionText">尚未选择时间</strong><div class="actions"><button class="btn primary" id="submitBooking" type="submit" disabled>确认预约</button></div></div>
      </form>
    </div>
    <section class="panel policy-card" id="policyCard" hidden></section>
  </main>
  <section class="state-card" id="stateCard" aria-live="polite"><h1>正在加载预约任务</h1><p>请稍候…</p></section>
  <div class="modal-backdrop" id="publicCancelModal" hidden><section class="modal" role="dialog" aria-modal="true" aria-labelledby="cancelDialogTitle"><h2 id="cancelDialogTitle">确认取消预约？</h2><p>取消后，这个时间会立即释放给其他人，且无法撤销。</p><div class="actions"><button class="btn" id="keepBooking" type="button">保留预约</button><button class="btn danger" id="confirmPublicCancel" type="button">确认取消</button></div></section></div>
  <div class="toast" id="toast" role="status"></div>
  <script src="/static/public.js" defer></script>
</body>
</html>
