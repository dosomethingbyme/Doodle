<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>预约</title>
  <style>
    :root{--ink:#17212b;--muted:#687481;--line:#dfe5ea;--soft:#f5f7f8;--green:#126d58;--green2:#e7f4ef;--blue:#1e5f8f;--danger:#a13b35;--shadow:0 18px 50px rgba(23,33,43,.08)}
    *{box-sizing:border-box}body{margin:0;background:linear-gradient(135deg,#f7faf8,#eef4f7);color:var(--ink);font:15px/1.55 -apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC",sans-serif;min-height:100vh}
    button,input,textarea,select{font:inherit}button{cursor:pointer}.shell{width:min(1120px,calc(100% - 32px));margin:38px auto 64px}.topbar{display:flex;justify-content:space-between;gap:24px;align-items:flex-start;margin-bottom:20px}.eyebrow{font-size:12px;letter-spacing:.14em;text-transform:uppercase;color:var(--green);font-weight:800}.topbar h1{font-size:clamp(28px,4vw,44px);line-height:1.14;margin:7px 0 8px}.description{max-width:720px;color:var(--muted);white-space:pre-wrap}.meta{display:flex;flex-wrap:wrap;gap:9px;margin-top:14px}.pill{padding:7px 11px;border-radius:999px;background:#fff;border:1px solid var(--line);color:#44515d;font-size:13px}
    .grid{display:grid;grid-template-columns:360px 1fr;gap:20px}.panel{background:rgba(255,255,255,.96);border:1px solid rgba(210,220,225,.9);border-radius:18px;box-shadow:var(--shadow)}.form-panel{padding:24px;align-self:start}.schedule-panel{padding:24px;min-width:0}.panel h2{margin:0 0 18px;font-size:20px}.field{margin-bottom:15px}.field label{display:flex;justify-content:space-between;font-weight:700;margin-bottom:6px}.optional{font-size:12px;color:var(--muted);font-weight:500}.field input,.field textarea,.field select{width:100%;border:1px solid #cfd8de;border-radius:10px;padding:10px 12px;background:white;outline:none}.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--green);box-shadow:0 0 0 3px rgba(18,109,88,.11)}.verify-row{display:grid;grid-template-columns:1fr auto;gap:8px}.btn{border:1px solid var(--line);background:#fff;border-radius:10px;padding:10px 14px;font-weight:750;color:var(--ink)}.btn:hover{border-color:#aab8c2}.btn.primary{background:var(--green);border-color:var(--green);color:white}.btn.primary:disabled{opacity:.45;cursor:not-allowed}.btn.danger{color:var(--danger)}.notice{font-size:13px;color:var(--muted);background:var(--soft);border-radius:10px;padding:10px 12px;margin:5px 0 16px}.notice.ok{background:var(--green2);color:var(--green)}.current-booking{background:var(--green2);border:1px solid #a8d2c6;border-radius:12px;padding:14px;margin-bottom:15px}.current-booking h3{margin:0 0 5px}.current-booking strong{display:block;font-size:17px;margin-bottom:9px}
    .date-tabs{display:flex;gap:8px;overflow:auto;padding-bottom:8px;margin-bottom:12px}.date-tab{min-width:112px;border:1px solid var(--line);background:#fff;border-radius:12px;padding:10px;text-align:left}.date-tab strong,.date-tab span{display:block}.date-tab span{font-size:12px;color:var(--muted)}.date-tab.active{background:var(--green2);border-color:#74ad9d;color:var(--green)}.period{padding:17px 0;border-top:1px solid var(--line)}.period:first-of-type{border-top:0}.period-head{display:flex;justify-content:space-between;margin-bottom:10px}.period-head span{color:var(--muted)}.slots{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:8px}.slot{border:1px solid var(--line);background:#fff;border-radius:10px;padding:10px 7px;font-weight:700}.slot.available:hover,.slot.selected{border-color:var(--green);background:var(--green2);color:var(--green)}.slot.occupied,.slot.locked,.slot.closed{background:#f2f4f5;color:#9aa3aa;cursor:not-allowed}.slot small{display:block;font-weight:500;font-size:11px}.legend{display:flex;gap:14px;flex-wrap:wrap;font-size:12px;color:var(--muted);margin-bottom:12px}.dot{display:inline-block;width:9px;height:9px;border-radius:3px;border:1px solid #aab8c2;margin-right:5px}.dot.available{background:#fff}.dot.occupied{background:#d7dde1}.dot.locked{background:#f2f4f5}.summary{margin-top:16px;border-radius:12px;background:#f0f7f4;padding:14px}.summary strong{display:block;font-size:17px;margin:2px 0 10px}.actions{display:flex;gap:8px;flex-wrap:wrap}.empty{padding:48px 18px;text-align:center;color:var(--muted)}.state-card{width:min(620px,calc(100% - 32px));margin:80px auto;background:white;padding:42px;border-radius:20px;text-align:center;box-shadow:var(--shadow)}.state-card h1{margin:0 0 12px}.error{color:var(--danger);font-size:13px;min-height:18px}.toast{position:fixed;left:50%;bottom:28px;transform:translate(-50%,20px);opacity:0;background:#17212b;color:#fff;padding:11px 16px;border-radius:10px;transition:.2s;pointer-events:none;z-index:10}.toast.show{opacity:1;transform:translate(-50%,0)}
    @media(max-width:820px){.grid{grid-template-columns:1fr}.slots{grid-template-columns:repeat(3,1fr)}.topbar{display:block}.shell{margin-top:24px}}@media(max-width:520px){.slots{grid-template-columns:repeat(2,1fr)}.panel{border-radius:14px}.form-panel,.schedule-panel{padding:18px}}
  </style>
</head>
<body>
  <main class="shell" id="app" hidden>
    <header class="topbar">
      <div>
        <div class="eyebrow">Booking page</div>
        <h1 id="taskTitle">预约</h1>
        <div class="description" id="taskDescription"></div>
        <div class="meta" id="taskMeta"></div>
      </div>
    </header>
    <div class="grid">
      <form class="panel form-panel" id="bookingForm" novalidate>
        <h2>预约信息</h2>
        <div class="field"><label for="name">姓名</label><input id="name" autocomplete="name" placeholder="请输入姓名" /></div>
        <div class="field"><label for="email">邮箱</label><div class="verify-row"><input id="email" type="email" autocomplete="email" placeholder="name@example.com" /><button class="btn" id="sendCode" type="button">发送验证码</button></div></div>
        <div class="field"><label for="emailCode">邮箱验证码</label><div class="verify-row"><input id="emailCode" inputmode="numeric" maxlength="6" placeholder="6 位验证码" /><button class="btn" id="verifyCode" type="button">验证</button></div></div>
        <div class="notice" id="verifyNotice">完成邮箱验证后即可提交预约。</div>
        <section class="current-booking" id="currentBookingCard" hidden><h3>您已预约</h3><strong id="currentBookingTime"></strong><div id="currentBookingLocation"></div><div class="field" style="margin-top:10px"><label for="publicCancelReason">取消原因 <span class="optional">选填</span></label><input id="publicCancelReason" placeholder="请简要说明取消原因"></div><button class="btn danger" id="cancelBooking" type="button">确认取消预约</button></section>
        <div id="customFields"></div>
        <div class="error" id="formError"></div>
        <div class="summary" id="selectionSummary">
          <span>当前选择</span><strong id="selectionText">尚未选择时间</strong>
          <div class="actions"><button class="btn primary" id="submitBooking" type="submit" disabled>确认预约</button></div>
        </div>
      </form>
      <section class="panel schedule-panel">
        <h2>选择时间</h2>
        <div class="legend"><span><i class="dot available"></i>可预约</span><span><i class="dot occupied"></i>已占用</span><span><i class="dot locked"></i>待开放</span></div>
        <div class="date-tabs" id="dateTabs"></div>
        <div id="slotGroups"></div>
      </section>
    </div>
  </main>
  <section class="state-card" id="stateCard"><h1>正在加载预约任务</h1><p>请稍候…</p></section>
  <div class="toast" id="toast" role="status"></div>
  <script>
    const publicId = location.pathname.split("/").filter(Boolean)[1] || "";
    const state = { task:null, selectedDate:"", selectedTime:"", verificationToken:"", verifiedEmail:"", currentBooking:null };
    const $ = (selector) => document.querySelector(selector);
    const app = $("#app"), stateCard = $("#stateCard"), dateTabs = $("#dateTabs"), slotGroups = $("#slotGroups");

    async function api(path, options={}) {
      const response = await fetch(path, {headers:{"Content-Type":"application/json",...(options.headers||{})},...options});
      const data = response.headers.get("content-type")?.includes("json") ? await response.json() : await response.text();
      if (!response.ok) throw new Error(data.error || "请求失败");
      return data;
    }
    function escapeHtml(value){return String(value??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#039;"})[c])}
    function toDate(key){const [y,m,d]=key.split("-").map(Number);return new Date(y,m-1,d)}
    const dateFormat = new Intl.DateTimeFormat("zh-CN",{month:"numeric",day:"numeric",weekday:"short"});
    function toast(message){$("#toast").textContent=message;$("#toast").classList.add("show");clearTimeout(toast.timer);toast.timer=setTimeout(()=>$("#toast").classList.remove("show"),2600)}

    function showState(title, message){app.hidden=true;stateCard.hidden=false;stateCard.innerHTML=`<h1>${escapeHtml(title)}</h1><p>${escapeHtml(message)}</p>`}
    function renderTask(){
      const task=state.task; document.title=task.title; $("#taskTitle").textContent=task.title; $("#taskDescription").textContent=task.description||"";
      const meta=[]; if(task.location)meta.push(`地点：${escapeHtml(task.location)}`); meta.push(`每次 ${task.slotMinutes} 分钟`); meta.push(`时区：${escapeHtml(task.timezone)}`);
      $("#taskMeta").innerHTML=meta.map(v=>`<span class="pill">${v}</span>`).join("");
      $("#customFields").innerHTML=task.fields.map(renderCustomField).join("");
      state.selectedDate=task.dates[0]||""; renderDates(); renderSlots(); updateForm(); app.hidden=false; stateCard.hidden=true;
    }
    function renderDates(){
      dateTabs.innerHTML=state.task.dates.map(key=>{const slots=state.task.slots.filter(s=>s.date===key);const available=slots.filter(s=>s.status==="available").length;return `<button class="date-tab ${key===state.selectedDate?"active":""}" type="button" data-date="${key}"><strong>${dateFormat.format(toDate(key))}</strong><span>${available} 个可预约</span></button>`}).join("");
    }
    function statusLabel(status){return {available:"可预约",occupied:"已占用",locked:"待开放",closed:"不可预约"}[status]||status}
    function renderSlots(){
      const slots=state.task.slots.filter(s=>s.date===state.selectedDate); const groups=new Map();
      slots.forEach(slot=>{if(!groups.has(slot.periodId))groups.set(slot.periodId,{label:slot.periodLabel,slots:[]});groups.get(slot.periodId).slots.push(slot)});
      slotGroups.innerHTML=groups.size?[...groups.values()].map(group=>`<section class="period"><div class="period-head"><strong>${escapeHtml(group.label)}</strong><span>${group.slots[0].time}–${group.slots.at(-1).endTime}</span></div><div class="slots">${group.slots.map(slot=>`<button type="button" class="slot ${slot.status} ${slot.time===state.selectedTime?"selected":""}" data-time="${slot.time}" ${slot.status!=="available"?"disabled":""}>${slot.time}<small>${statusLabel(slot.status)}</small></button>`).join("")}</div></section>`).join(""):`<div class="empty">该日期暂无开放时间。</div>`;
    }
    function renderCustomField(field,index){const label=`<label for="custom_${index}">${escapeHtml(field.label)}${field.required?"":"<span class=\"optional\">选填</span>"}</label>`;if(field.type==="textarea")return `<div class="field">${label}<textarea id="custom_${index}" data-key="${field.key}" ${field.required?"required":""}></textarea></div>`;if(field.type==="select")return `<div class="field">${label}<select id="custom_${index}" data-key="${field.key}" ${field.required?"required":""}><option value="">请选择</option>${field.options.map(v=>`<option value="${escapeHtml(v)}">${escapeHtml(v)}</option>`).join("")}</select></div>`;return `<div class="field">${label}<input id="custom_${index}" data-key="${field.key}" type="${field.type==="phone"?"tel":"text"}" ${field.required?"required":""}></div>`}
    function updateForm(){
      const verified=state.verificationToken && state.verifiedEmail===$("#email").value.trim().toLowerCase();
      $("#verifyNotice").classList.toggle("ok",Boolean(verified)); $("#verifyNotice").textContent=verified?(state.currentBooking?"邮箱已验证，并找到您在此任务中的预约。":"邮箱已验证，当前没有此任务的有效预约。完成人员信息后即可提交。") : "完成邮箱验证后即可提交预约。";
      $("#currentBookingCard").hidden=!state.currentBooking;if(state.currentBooking){$("#currentBookingTime").textContent=`${state.currentBooking.date} ${state.currentBooking.time}–${state.currentBooking.endTime}`;$("#currentBookingLocation").textContent=state.task.location?`地点：${state.task.location}`:""}
      const selected=state.task?.slots.find(s=>s.date===state.selectedDate&&s.time===state.selectedTime);
      $("#selectionText").textContent=selected?`${state.selectedDate} ${selected.time}–${selected.endTime}`:"尚未选择时间";
      $("#selectionSummary").hidden=Boolean(state.currentBooking);$("#submitBooking").disabled=!(verified && !state.currentBooking && selected && $("#name").value.trim());
    }
    async function lookupCurrentBooking(){const result=await api(`/api/public/tasks/${publicId}/bookings/lookup`,{method:"POST",body:JSON.stringify({email:state.verifiedEmail,verificationToken:state.verificationToken})});state.currentBooking=result.booking;updateForm()}
    async function refresh(){state.task=await api(`/api/public/tasks/${publicId}`);if(state.task.status!=="published"){const copy={draft:["尚未开放","此预约任务仍在准备中。"],paused:["预约已暂停","组织者暂时停止接受新预约。"],ended:["预约已结束","此预约任务已经结束。"],archived:["预约已归档","此预约任务已经结束。"]}[state.task.status]||["当前不可预约","请稍后再试。"];showState(copy[0],copy[1]);return}renderTask()}

    dateTabs.addEventListener("click",event=>{const button=event.target.closest("[data-date]");if(!button)return;state.selectedDate=button.dataset.date;state.selectedTime="";renderDates();renderSlots();updateForm()});
    slotGroups.addEventListener("click",event=>{const button=event.target.closest("[data-time]");if(!button||button.disabled)return;state.selectedTime=button.dataset.time;renderSlots();updateForm()});
    $("#email").addEventListener("input",()=>{if($("#email").value.trim().toLowerCase()!==state.verifiedEmail){state.verificationToken="";state.currentBooking=null}updateForm()}); $("#name").addEventListener("input",updateForm);
    $("#sendCode").addEventListener("click",async()=>{try{const email=$("#email").value.trim();const result=await api("/api/verification/send",{method:"POST",body:JSON.stringify({email})});if(result.devCode)$("#emailCode").value=result.devCode;toast(result.message)}catch(error){toast(error.message)}});
    $("#verifyCode").addEventListener("click",async()=>{try{const email=$("#email").value.trim().toLowerCase();const result=await api("/api/verification/verify",{method:"POST",body:JSON.stringify({email,code:$("#emailCode").value.trim()})});state.verifiedEmail=email;state.verificationToken=result.verificationToken;await lookupCurrentBooking();toast("邮箱验证成功")}catch(error){toast(error.message)}});
    $("#bookingForm").addEventListener("submit",async event=>{event.preventDefault();$("#formError").textContent="";const answers={};document.querySelectorAll("[data-key]").forEach(input=>answers[input.dataset.key]=input.value.trim());for(const field of state.task.fields){if(field.required&&!answers[field.key]){$("#formError").textContent=`请填写${field.label}`;return}}try{const result=await api(`/api/public/tasks/${publicId}/bookings`,{method:"POST",body:JSON.stringify({name:$("#name").value.trim(),email:$("#email").value.trim(),verificationToken:state.verificationToken,date:state.selectedDate,time:state.selectedTime,answers})});state.currentBooking=result;state.selectedTime="";await refresh();updateForm();toast("预约成功，预约信息已显示在页面中");if(result.emailWarning)toast(result.emailWarning)}catch(error){$("#formError").textContent=error.message}});
    $("#cancelBooking").addEventListener("click",async()=>{try{await api(`/api/public/tasks/${publicId}/bookings/by-email`,{method:"DELETE",body:JSON.stringify({email:$("#email").value.trim(),verificationToken:state.verificationToken,reason:$("#publicCancelReason").value.trim()})});state.currentBooking=null;$("#publicCancelReason").value="";toast("预约已取消，您可以重新选择时间");await refresh();updateForm()}catch(error){toast(error.message)}});
    refresh().catch(error=>showState("无法打开预约任务",error.message));
  </script>
</body>
</html>
